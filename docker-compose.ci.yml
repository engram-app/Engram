# Ephemeral CI test stack — Ollama on FastRaid (GPU), Qdrant on SlowRaid (AVX2).
#
# Always invoke with explicit project name for stable container names:
#   docker compose -f docker-compose.ci.yml -p engram-ci up -d --build --wait
#   python3 -m pytest e2e/tests/ -v  # E2E tests run against this stack
#   docker compose -f docker-compose.ci.yml -p engram-ci down -v --remove-orphans
#
# Container names: engram-ci-engram-1, engram-ci-postgres-1.
#
# External services (persistent, not in this compose):
#   Ollama:  http://10.0.20.214:11434  (FastRaid — GPU for embeddings)
#   Qdrant:  http://10.0.20.201:6333   (SlowRaid — AVX2 for binary quantization, v1.17.1)
#
# Ports default to offsets from standard dev ports, but can be overridden
# via CI_ENGRAM_PORT / CI_PG_PORT for parallel-safe runs.

name: engram-ci

services:
  engram:
    # Pre-built tag from the CI `prebuild-ci-image` job — all e2e-* jobs
    # share this image via the runner VM's shared docker daemon. Local dev
    # falls back to `engram-ci:local` (built by `docker compose build`).
    image: ${ENGRAM_CI_IMAGE:-engram-ci:local}
    build:
      context: .
      args:
        # Bare image refs; the runner's HTTPS_PROXY config caches via FastRaid
        # (rpardini docker-registry-proxy at 10.0.20.214:5000) transparently —
        # see docs/context/runner-vm-setup.md Gotcha #6. Prefixing with
        # ${LOCAL_REGISTRY} treats the proxy as a registry mirror, which it is
        # not, and BuildKit fails with "unexpected media type / not found".
        NODE_IMAGE: node:20-slim
        BUILDER_IMAGE: hexpm/elixir:1.17.3-erlang-27.1.2-debian-bookworm-20241202-slim
        RUNNER_IMAGE: debian:bookworm-20241202-slim
    ports:
      - "${CI_ENGRAM_PORT:-8100}:4000"
    environment:
      SECRET_KEY_BASE: "ci-test-secret-base-not-for-production-at-least-64-bytes-long-enough-for-phoenix"
      DATABASE_URL: postgresql://engram:engram@postgres:5432/engram
      JWT_SECRET: ci-test-secret-not-for-production
      PHX_SERVER: "true"
      OLLAMA_URL: http://10.0.20.214:11434
      QDRANT_URL: http://10.0.20.201:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-ci_test_notes}
      EMBED_MODEL: mxbai-embed-large
      EMBED_DIMS: "1024"
      EMBED_BACKEND: ollama
      AUTH_PROVIDER: clerk
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      KEY_PROVIDER: ${KEY_PROVIDER:-local}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:?ENCRYPTION_MASTER_KEY must be set (CI workflow injects from secret, local dev sets via .env)}
      ENCRYPTION_MASTER_KEY_PREVIOUS: ${ENCRYPTION_MASTER_KEY_PREVIOUS:-}
      # S3-compatible attachment storage (MinIO sidecar). This stack tests the
      # S3 path, so STORAGE_BACKEND is pinned to s3 — the e2e ciphertext-at-rest
      # probe expects a MinIO object. (The bytea `database` backend, #297, is
      # exercised separately by the storage-database CI job; runtime.exs
      # defaults to s3.)
      STORAGE_BACKEND: s3
      STORAGE_BUCKET: engram-attachments
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin
      STORAGE_SCHEME: "http://"
      STORAGE_HOST: minio
      STORAGE_PORT: "9000"
      STORAGE_REGION: us-east-1
      # Force plan-limit enforcement in CI. Without this, runtime.exs's
      # self-host bypass (PADDLE_API_KEY unset → :limits_enforced=false)
      # would kick in and free-tier limits (e.g. vaults_cap=1) would not
      # be enforced — breaking e2e tests like test_32 that assert 402 on
      # over-limit vault creation.
      ENGRAM_LIMITS_ENFORCED: "true"
      # OAuth e2e tests (test_44/47/48/49) collectively call
      # POST /api/auth/device + /auth/device/authorize + /auth/token/refresh
      # well above the prod default 10 req/60s/IP from the test runner's
      # single source IP — collisions yield flaky 429 "rate_limited" failures.
      # Mirrors the override in docker-compose.ci-local.yml.
      RATE_LIMIT_AUTH_OVERRIDE: "1000"
      # Free-tier launch test_72_cancel_to_free_overlimit signs a synthetic
      # subscription.canceled webhook with this fixed secret so the e2e
      # exercises the real verify_signature → upsert_from_paddle_event path
      # (Phase 4) end-to-end. Not a real Paddle env — purely test fixture.
      PADDLE_NOTIFICATION_SECRET: ${PADDLE_NOTIFICATION_SECRET:-pdl_ntfn_e2e_fake}
    healthcheck:
      # 1s interval (was 3s) so docker compose --wait detects "ready" with
      # finer granularity — BEAM cold boot finishes mid-interval and the
      # next probe fires within 1s instead of waiting up to 3s.
      # start_period 10s covers release migrate + Phoenix endpoint listen.
      # Retry budget: 10s start_period + 60*1s = 70s before docker marks
      # container failed (was 3s + 15*3s = 48s) — slightly more lenient but
      # ready-detection is much tighter on the happy path.
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/api/health || exit 1"]
      start_period: 10s
      interval: 1s
      timeout: 2s
      retries: 60
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: "no"

  postgres:
    image: postgres:16-alpine
    ports:
      - "${CI_PG_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
      POSTGRES_DB: engram
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram"]
      interval: 1s
      timeout: 2s
      retries: 30
    restart: "no"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 3s
      retries: 30
    restart: "no"

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/engram-attachments;
      exit 0;
      "
    restart: "no"
