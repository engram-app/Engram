name: Deploy prod

# Pushing a `release-v*` git tag triggers this workflow, which opens a
# PR in engram-app/engram-infra rewriting the `engram_image_tag`
# default in `main/envs/prod/variables.tf` to the `sha-<7>` of the
# tagged commit. On merge, engram-infra's CI `terraform (prod)` job
# applies the change: a new ECS task definition is registered with the
# pinned image, and the engram-saas-prod service rolls onto it.
#
# This is the GitOps mirror of the staging-fastraid `bump-infra-tfvars`
# pattern (engram/.github/workflows/verify.yml). Image tag = desired state
# in git; engram-infra is the reconciler.
#
# Release recipe:
#   git tag release-v0.5.234 <commit>   # commit must already be on main
#   git push origin release-v0.5.234
#
# Rollback recipe (forward-roll — no separate workflow):
#   git tag release-v0.5.235 <last-known-good-sha-on-main>
#   git push origin release-v0.5.235
on:
  push:
    tags: ['release-v*']

concurrency:
  # Serialize deploys globally so two release tags can't race the same
  # bot-PR branch in engram-infra.
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  open-infra-pr:
    runs-on: [self-hosted, linux, x64, isolated]
    steps:
      - name: Checkout engram (tagged commit)
        uses: actions/checkout@v6

      - name: Compute image tag from tagged commit
        id: tags
        run: |
          # github.sha is the commit the release tag points at.
          SHA=$(git rev-parse --short=7 "${{ github.sha }}")
          FULL_SHA="${{ github.sha }}"
          echo "image_tag=sha-$SHA" >> "$GITHUB_OUTPUT"
          # Backend Sentry SDK release tag — must match what
          # `getsentry/action-release@v3` registers in verify.yml
          # (`version: ${{ github.sha }}` — full 40-char SHA). Sourced as
          # an ECS env var via the engram_release_sha TF variable so the
          # backend SDK's `release` matches the frontend SDK + the Sentry
          # UI release entry exactly.
          echo "release_sha=$FULL_SHA" >> "$GITHUB_OUTPUT"
          echo "release=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "Deploying $GITHUB_REF_NAME → image sha-$SHA (release=$FULL_SHA)"

      # Mint a short-lived installation token for the engram-infra-tf
      # GitHub App, scoped to engram-app/engram-infra only. Required
      # permissions on engram-infra:
      #   - contents: read & write   (push branch)
      #   - pull-requests: read & write   (open PR + auto-merge)
      # Same App + secrets already used by the staging `bump-infra-tfvars`
      # job in ci.yml.
      - name: Generate engram-infra App installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: engram-app
          repositories: engram-infra

      - name: Checkout engram-infra
        uses: actions/checkout@v6
        with:
          repository: engram-app/engram-infra
          token: ${{ steps.app-token.outputs.token }}
          path: engram-infra
          ref: main
          # peter-evans/create-pull-request@v8 sets its own
          # Authorization header on push; persist-credentials=true would
          # leave the checkout's basic-auth extraheader in git config,
          # and the second header triggers GitHub's "Duplicate header:
          # Authorization" 400. See the matching note in ci.yml's
          # bump-infra-tfvars job.
          persist-credentials: false

      - name: Rewrite engram_image_tag + engram_release_sha defaults in variables.tf
        id: rewrite
        env:
          IMAGE_TAG: ${{ steps.tags.outputs.image_tag }}
          RELEASE_SHA: ${{ steps.tags.outputs.release_sha }}
        run: |
          python3 - <<'PY'
          import os
          import re

          path = "engram-infra/main/envs/prod/variables.tf"
          image_tag = os.environ["IMAGE_TAG"]
          release_sha = os.environ["RELEASE_SHA"]
          gh_output = os.environ["GITHUB_OUTPUT"]

          text = open(path).read()

          # Each rewrite is anchored on the variable block name + must match
          # exactly once. Adding other `default = ` lines elsewhere is safe.
          # Hard-fail on count != 1 — silent shape changes are how the prod
          # task def would diverge from the GitOps source of truth.
          def rewrite(text, var_name, value):
              pattern = re.compile(
                  rf'(variable\s+"{var_name}"[^}}]*?default\s*=\s*)"[^"]*"',
                  re.DOTALL,
              )
              new, count = pattern.subn(rf'\g<1>"{value}"', text)
              if count != 1:
                  raise SystemExit(
                      f"expected exactly 1 {var_name} block, got {count}; "
                      "variables.tf shape changed — adjust the regex"
                  )
              print(f"rewrote {var_name} default → {value}")
              return new

          text = rewrite(text, "engram_image_tag", image_tag)
          text = rewrite(text, "engram_release_sha", release_sha)

          open(path, "w").write(text)
          with open(gh_output, "a") as f:
              f.write("rewrote=true\n")
          PY

          echo "::group::variables.tf after rewrite"
          cat engram-infra/main/envs/prod/variables.tf
          echo "::endgroup::"

      - name: Open / update PR in engram-infra
        id: open-pr
        uses: peter-evans/create-pull-request@v8
        with:
          path: engram-infra
          token: ${{ steps.app-token.outputs.token }}
          # Branch is reused across deploys (matches staging pattern).
          # Each new release force-pushes the branch with the latest
          # sha-tag; a still-open PR is updated in place rather than
          # piling up duplicates.
          branch: bot/bump-engram-prod
          delete-branch: true
          # engram-infra's ruleset enforces required_signatures = true.
          # sign-commits routes through the GraphQL createCommitOnBranch
          # mutation so GitHub auto-signs on behalf of the App.
          sign-commits: true
          commit-message: |
            chore(prod): bump engram image to ${{ steps.tags.outputs.image_tag }}

            Automated bump from engram-app/Engram release ${{ steps.tags.outputs.release }}.
          title: "chore(prod): bump engram image to ${{ steps.tags.outputs.image_tag }}"
          body: |
            Automated bump from engram-app/Engram release `${{ steps.tags.outputs.release }}`.

            Source commit: ${{ github.repository }}@${{ github.sha }}

            Bumps two defaults in `main/envs/prod/variables.tf`:
            - `engram_image_tag` → **`${{ steps.tags.outputs.image_tag }}`** (ECR tag rolled by `terraform (prod)`)
            - `engram_release_sha` → **`${{ steps.tags.outputs.release_sha }}`** (full git SHA — backend Sentry SDK release tag, must match `getsentry/action-release@v3` registration)

            ## What this triggers

            On merge, `.github/workflows/ci.yml` `terraform (prod)` runs `terraform apply -auto-approve`. The new task definition revision pins the engram-saas-prod container image to `${{ vars.AWS_ECR_REPOSITORY || 'engram-saas-prod' }}:${{ steps.tags.outputs.image_tag }}`, and the ECS service rolls onto it.

            ## Review

            Auto-generated; if `variables.tf` has any non-image diff, treat as a regex regression and investigate before merging.
          labels: |
            automated
            tf-image-bump

      - name: Enable auto-merge on bot PR
        # Auto-merge queues the PR for merge once required checks pass.
        # engram-infra has `allow_auto_merge=true` in repos.tf.
        if: steps.open-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.open-pr.outputs.pull-request-number }}
        run: |
          gh pr merge --auto --squash --repo engram-app/engram-infra "$PR_NUMBER"

      - name: Summary
        env:
          PR_NUMBER: ${{ steps.open-pr.outputs.pull-request-number }}
          PR_URL: ${{ steps.open-pr.outputs.pull-request-url }}
        run: |
          {
            echo "## GitOps PR opened"
            echo ""
            echo "- Release tag: \`${{ steps.tags.outputs.release }}\`"
            echo "- Commit: ${{ github.sha }}"
            echo "- Image tag: \`${{ steps.tags.outputs.image_tag }}\`"
            if [ -n "$PR_NUMBER" ]; then
              echo "- engram-infra PR: [#${PR_NUMBER}](${PR_URL}) (auto-merge enabled)"
            else
              echo "- No PR opened (no diff — image already at this tag)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Notify Discord on success. "Deploy initiated" — not "deploy
      # complete" — since the actual ECS rollout happens later in
      # engram-infra's `terraform (prod)` apply (~3-5 min after the
      # bot PR auto-merges). Complete-rollout notify is a future
      # observability item (Tier 3); this catches the operator's
      # "did the tag push do anything?" question. Silently no-ops
      # when DISCORD_DEPLOY_WEBHOOK_URL is unset.
      - name: Notify Discord (deploy initiated)
        if: success() && env.WEBHOOK != ''
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
          RELEASE: ${{ steps.tags.outputs.release }}
          IMAGE: ${{ steps.tags.outputs.image_tag }}
          PR_NUMBER: ${{ steps.open-pr.outputs.pull-request-number }}
          PR_URL: ${{ steps.open-pr.outputs.pull-request-url }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -n "$PR_NUMBER" ]; then
            CONTENT="[DEPLOY-INITIATED] \`${RELEASE}\` → \`${IMAGE}\`
          engram-infra PR: ${PR_URL}
          Tagged by: ${ACTOR}"
          else
            CONTENT="[DEPLOY-NOOP] \`${RELEASE}\` → \`${IMAGE}\` (image already at this tag; no PR opened)
          Tagged by: ${ACTOR}"
          fi
          curl -sS -X POST -H 'Content-Type: application/json' \
            --max-time 5 \
            --data "$(jq -nc --arg c "$CONTENT" '{content:$c}')" \
            "$WEBHOOK"

      # Mark "release initiated" in Grafana so the operator sees a vertical
      # line on every Engram-folder dashboard. The matching "applied"
      # annotation lands ~3-5 min later when engram-infra's
      # `terraform (prod)` apply rolls the ECS service onto the new task
      # def. SAT is mirrored from SOPS to a repo secret here (see comment
      # in engram-infra `main/envs/prod/grafana.tf`); rotation requires
      # updating both. Best-effort: a failed annotation doesn't fail the
      # deploy. Skipped silently if the secret isn't set (e.g. on a fork).
      - name: Annotate release-initiated in Grafana
        if: success() && steps.open-pr.outputs.pull-request-number != '' && env.GRAFANA_SAT != ''
        env:
          GRAFANA_SAT: ${{ secrets.GRAFANA_SAT_CLAUDE_CODE }}
          RELEASE: ${{ steps.tags.outputs.release }}
          IMAGE: ${{ steps.tags.outputs.image_tag }}
          PR_URL: ${{ steps.open-pr.outputs.pull-request-url }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          NOW_MS=$(( $(date +%s%N) / 1000000 ))
          TEXT=$(printf 'release initiated: `%s` → `%s`\nengram-infra PR: %s\n[run](%s)' \
            "$RELEASE" "$IMAGE" "$PR_URL" "$GH_RUN_URL")
          BODY=$(jq -nc \
            --arg time "$NOW_MS" \
            --arg text "$TEXT" \
            '{time:($time|tonumber), text:$text, tags:["deploy","initiated","engram","prod"]}')
          curl -sS --fail-with-body --max-time 10 \
            -X POST \
            -H "Authorization: Bearer $GRAFANA_SAT" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            https://calmeucalyptus520.grafana.net/api/annotations \
            | jq -r '"annotation id: \(.id)"' \
            || echo "::warning::Grafana annotation failed — deploy unaffected"

      # Failure path — same webhook, different framing. `failure()`
      # fires when an earlier step exited non-zero.
      - name: Notify Discord (deploy failed)
        if: failure() && env.WEBHOOK != ''
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
          RELEASE: ${{ steps.tags.outputs.release || github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          CONTENT="[DEPLOY-FAILED] \`${RELEASE}\`
          Run: ${RUN_URL}
          Tagged by: ${ACTOR}"
          curl -sS -X POST -H 'Content-Type: application/json' \
            --max-time 5 \
            --data "$(jq -nc --arg c "$CONTENT" '{content:$c}')" \
            "$WEBHOOK"

  create-release-notes:
    # Auto-create a GitHub Release for the release-v* tag with a
    # SCHEMA-IMPACT prepend when any merged PR in the release range
    # carries a phase/* label. Self-hosters read this on the release
    # page before pulling the new image. When no phase/* labels exist
    # in the range, no Release is created (empty notes are not useful).
    runs-on: [self-hosted, linux, x64, isolated]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release range
        id: range
        run: |
          tag="${{ github.ref_name }}"
          # Previous release-v* tag, sorted by version. Exclude the current
          # tag in case sort returns it first (defensive).
          prev=$(git tag -l 'release-v*' --sort=-v:refname | grep -v "^${tag}\$" | head -1)
          if [ -z "$prev" ]; then
            # First release ever — compare against repo root commit.
            prev=$(git rev-list --max-parents=0 HEAD | head -1)
            echo "::notice::No prior release-v* tag — comparing against repo root commit $prev"
          fi
          echo "base_sha=$(git rev-parse "$prev")" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(git rev-parse "$tag")" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$prev" >> "$GITHUB_OUTPUT"

      - name: Generate SCHEMA-IMPACT block
        id: impact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes=$(bash scripts/generate_schema_impact_notes.sh \
            "${{ steps.range.outputs.base_sha }}" \
            "${{ steps.range.outputs.head_sha }}")
          if [ -z "$notes" ]; then
            echo "has_impact=false" >> "$GITHUB_OUTPUT"
            echo "No phase/* labels in release range — skipping release-notes creation."
            exit 0
          fi
          echo "has_impact=true" >> "$GITHUB_OUTPUT"
          # Stash notes for the next step (multiline outputs need EOF delimiter).
          {
            echo "notes<<NOTES_EOF"
            echo "$notes"
            echo ""
            echo "---"
            echo ""
            echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/${{ steps.range.outputs.prev_tag }}...${{ github.ref_name }}"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.impact.outputs.has_impact == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES: ${{ steps.impact.outputs.notes }}
        run: |
          # Pass notes via env var to avoid bash arg-parsing issues with
          # double quotes in PR titles. --notes-file is the canonical form.
          notes_file=$(mktemp)
          trap 'rm -f "$notes_file"' EXIT
          printf '%s' "$NOTES" > "$notes_file"
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file "$notes_file" \
            --target "${{ github.sha }}"
