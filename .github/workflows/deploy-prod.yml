name: Deploy prod

# Pushing a `release-v*` git tag triggers this workflow, which opens a
# PR in engram-app/engram-infra rewriting the `engram_image_tag`
# default in `main/envs/prod/variables.tf` to the `sha-<7>` of the
# tagged commit. On merge, engram-infra's CI `terraform (prod)` job
# applies the change: a new ECS task definition is registered with the
# pinned image, and the engram-saas-prod service rolls onto it.
#
# This is the GitOps mirror of the staging-fastraid `bump-infra-tfvars`
# pattern (engram/.github/workflows/verify.yml). Image tag = desired state
# in git; engram-infra is the reconciler.
#
# Release recipe:
#   git tag release-v0.5.234 <commit>   # commit must already be on main
#   git push origin release-v0.5.234
#
# Rollback recipe (forward-roll — no separate workflow):
#   git tag release-v0.5.235 <last-known-good-sha-on-main>
#   git push origin release-v0.5.235
on:
  push:
    tags: ['release-v*']

concurrency:
  # Serialize deploys globally so two release tags can't race the same
  # bot-PR branch in engram-infra.
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Real-app proof gate. Before prod moves, run the FULL Obsidian e2e suite
  # (e2e-clerk / e2e-crdt / e2e-browser) against the EXACT commit this
  # release-v* tag points at, and BLOCK the deploy if any of them fail.
  #
  # Why dispatch verify.yml instead of a workflow_call or a copy of the
  # bring-up steps:
  #   - verify.yml already owns the ~600-line Obsidian/Xvfb/CDP bring-up.
  #     Copying it here would rot; a workflow_call refactor would have to
  #     thread `force_full` through verify.yml's fingerprint gating (dozens
  #     of `if:` conditions) and is a big change to the shared merge-gate
  #     file. This job touches ONLY deploy-prod.yml — maximally conservative.
  #   - verify.yml IGNORES release-v* tags (`tags-ignore`) and its `ci`
  #     aggregate treats the full-Obsidian e2e as REPORT-ONLY (#1076), so a
  #     tag push alone runs nothing and the run conclusion would be green even
  #     on a red e2e. This gate therefore (a) dispatches verify.yml with
  #     `force_full=true` on the tag ref so the fingerprint is bypassed and
  #     every e2e job actually runs, and (b) reads the INDIVIDUAL e2e-* job
  #     conclusions (not the run/ci conclusion) to decide pass/fail.
  #   - GITHUB_TOKEN is an explicit exception to Actions' recursion guard for
  #     workflow_dispatch, so `actions: write` lets us kick verify.yml.
  #
  # Emergency override (GATED by default): a hotfix or a known-flake can be
  # shipped by putting `[skip-release-e2e]` in the ANNOTATED tag's message:
  #   git tag -a release-v0.5.999 -m "[skip-release-e2e] hotfix: <reason>" <sha>
  #   git push origin release-v0.5.999
  # The bypass is explicit and LOGGED (::warning::). A plain lightweight tag
  # (the normal recipe) has no message, so it can never accidentally bypass.
  release-e2e-gate:
    runs-on: [self-hosted, linux, x64, isolated]
    permissions:
      contents: read
      actions: write   # dispatch verify.yml + read its run/job conclusions
    env:
      # gh resolves the repo from `git remote -v`, which the runners rewrite to
      # the LAN git cache (unknown host) — pin GH_REPO + pass --repo explicitly.
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.ref_name }}
      HEAD_SHA: ${{ github.sha }}
    steps:
      - name: Check for emergency override in tag annotation
        id: override
        run: |
          set -euo pipefail
          # Read the annotated-tag message via the API (no dependence on local
          # fetch depth). A lightweight tag resolves to a commit object with no
          # message → no override → gated (the safe default).
          msg=""
          obj_type=$(gh api "repos/${GH_REPO}/git/ref/tags/${TAG}" -q '.object.type' 2>/dev/null || echo "")
          obj_sha=$(gh api "repos/${GH_REPO}/git/ref/tags/${TAG}" -q '.object.sha' 2>/dev/null || echo "")
          if [ "$obj_type" = "tag" ] && [ -n "$obj_sha" ]; then
            msg=$(gh api "repos/${GH_REPO}/git/tags/${obj_sha}" -q '.message' 2>/dev/null || echo "")
          fi
          if printf '%s' "$msg" | grep -qiF '[skip-release-e2e]'; then
            echo "::warning::[skip-release-e2e] found in tag ${TAG} annotation — BYPASSING the full-Obsidian e2e gate. Deploy proceeds WITHOUT real-app proof."
            echo "bypass=true" >> "$GITHUB_OUTPUT"
          else
            echo "bypass=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch verify.yml (force_full) on the tagged commit
        if: steps.override.outputs.bypass != 'true'
        id: dispatch
        run: |
          set -euo pipefail
          echo "Dispatching verify.yml with force_full=true on ${TAG} (${HEAD_SHA})"
          # Timestamp BEFORE dispatch. On the rollback recipe the tag re-points a
          # PREVIOUSLY-released SHA that already has a completed workflow_dispatch
          # run on this exact headSha; without this fence an early poll would match
          # that STALE run and gate on last release's e2e. Only accept a run
          # created after we dispatched.
          START_EPOCH=$(date -u +%s)
          gh workflow run verify.yml --repo "$GH_REPO" --ref "$TAG" -f force_full=true

          # workflow_dispatch returns no run id; discover the run whose headSha
          # is this tag's commit AND was created after dispatch (unique per
          # release). Retry — the run takes a few seconds to register.
          run_id=""
          for i in $(seq 1 40); do
            sleep 6
            run_id=$(gh run list --repo "$GH_REPO" --workflow=verify.yml \
              --event=workflow_dispatch --json databaseId,headSha,createdAt \
              -q "[.[] | select(.headSha==\"${HEAD_SHA}\") | select((.createdAt|fromdateiso8601) > ${START_EPOCH})] | sort_by(.createdAt) | last | .databaseId" \
              2>/dev/null || echo "")
            if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
              break
            fi
          done
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "::error::Could not find the dispatched verify.yml run for ${HEAD_SHA} — refusing to deploy blind."
            exit 1
          fi
          echo "Dispatched verify.yml run: $run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Wait for the e2e run to complete
        if: steps.override.outputs.bypass != 'true'
        env:
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        run: |
          set -euo pipefail
          echo "Waiting for verify.yml run ${RUN_ID} (full Obsidian e2e)…"
          # Poll rather than `gh run watch` so a transient watch drop doesn't
          # kill the gate. The suite runs ~20-40 min.
          for i in $(seq 1 120); do  # 120 * 45s = 90 min ceiling
            status=$(gh run view "$RUN_ID" --repo "$GH_REPO" --json status -q '.status' 2>/dev/null || echo "")
            if [ "$status" = "completed" ]; then
              echo "Run ${RUN_ID} completed."
              exit 0
            fi
            echo "  status=${status:-unknown} (poll $i)"
            sleep 45
          done
          echo "::error::verify.yml run ${RUN_ID} did not complete within the gate window — refusing to deploy blind."
          exit 1

      - name: Gate on the full-Obsidian e2e job conclusions
        if: steps.override.outputs.bypass != 'true'
        env:
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        run: |
          set -euo pipefail
          run_url="${{ github.server_url }}/${GH_REPO}/actions/runs/${RUN_ID}"
          gh run view "$RUN_ID" --repo "$GH_REPO" --json jobs > jobs.json

          # The `ci` aggregate in verify.yml treats these three as report-only,
          # so we read their INDIVIDUAL conclusions here. force_full=true made
          # the fingerprint run them all, so a wholesale skip is itself a bug.
          echo "::group::e2e job conclusions"
          jq -r '.jobs[] | select(.name|test("^e2e-(clerk|crdt|browser)$")) | "\(.name)=\(.conclusion)"' jobs.json
          echo "::endgroup::"

          # force_full=true ran all three, so each MUST be present and == success.
          # A SKIP (or absence) of any e2e job on a release is by definition a bug,
          # so assert success explicitly rather than merely "not failed".
          for job in e2e-clerk e2e-crdt e2e-browser; do
            concl=$(jq -r --arg j "$job" \
              '[.jobs[] | select(.name==$j)] | (first | .conclusion) // "absent"' jobs.json)
            if [ "$concl" != "success" ]; then
              echo "::error::Release e2e gate: ${job} did not pass (conclusion=${concl}) — refusing to deploy ${TAG}. See ${run_url}"
              exit 1
            fi
          done
          echo "Full-Obsidian e2e green for ${TAG} — deploy may proceed. Proof: ${run_url}"

      # Gate-block is otherwise silent (open-infra-pr is skipped, so its
      # failure() Discord notice never fires). Mirror that notice here.
      - name: Notify Discord (release e2e gate blocked)
        if: failure() && env.WEBHOOK != ''
        env:
          WEBHOOK: ${{ secrets.DISCORD_RELEASES_WEBHOOK_URL }}
          RELEASE: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          CONTENT="[DEPLOY-BLOCKED] \`${RELEASE}\` — release e2e gate FAILED (real-app proof red; prod not moving)
          Run: ${RUN_URL}
          Tagged by: ${ACTOR}"
          curl -sS -X POST -H 'Content-Type: application/json' \
            --max-time 5 \
            --data "$(jq -nc --arg c "$CONTENT" '{content:$c}')" \
            "$WEBHOOK"

  open-infra-pr:
    # BLOCKED on the real-app proof gate: a red full-Obsidian e2e (or a failed
    # dispatch/wait) fails release-e2e-gate → this job is skipped → prod never
    # moves. On the override path the gate SUCCEEDS (with a ::warning::) so the
    # happy path below is byte-for-byte what it was before the gate existed.
    needs: release-e2e-gate
    runs-on: [self-hosted, linux, x64, isolated]
    steps:
      - name: Checkout engram (tagged commit)
        uses: actions/checkout@v7

      - name: Compute image tag from tagged commit
        id: tags
        run: |
          # github.sha is the commit the release tag points at.
          SHA=$(git rev-parse --short=7 "${{ github.sha }}")
          FULL_SHA="${{ github.sha }}"
          echo "image_tag=sha-$SHA" >> "$GITHUB_OUTPUT"
          # Backend Sentry SDK release tag — must match what
          # `getsentry/action-release@v3` registers in verify.yml
          # (`version: ${{ github.sha }}` — full 40-char SHA). Sourced as
          # an ECS env var via the engram_release_sha TF variable so the
          # backend SDK's `release` matches the frontend SDK + the Sentry
          # UI release entry exactly.
          echo "release_sha=$FULL_SHA" >> "$GITHUB_OUTPUT"
          echo "release=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "Deploying $GITHUB_REF_NAME → image sha-$SHA (release=$FULL_SHA)"

      # Mint a short-lived installation token for the engram-infra-tf
      # GitHub App, scoped to engram-app/engram-infra only. Required
      # permissions on engram-infra:
      #   - contents: read & write   (push branch)
      #   - pull-requests: read & write   (open PR + auto-merge)
      # Same App + secrets already used by the staging `bump-infra-tfvars`
      # job in ci.yml.
      - name: Generate engram-infra App installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: engram-app
          repositories: engram-infra

      - name: Checkout engram-infra
        uses: actions/checkout@v7
        with:
          repository: engram-app/engram-infra
          token: ${{ steps.app-token.outputs.token }}
          path: engram-infra
          ref: main
          # peter-evans/create-pull-request@v8 sets its own
          # Authorization header on push; persist-credentials=true would
          # leave the checkout's basic-auth extraheader in git config,
          # and the second header triggers GitHub's "Duplicate header:
          # Authorization" 400. See the matching note in ci.yml's
          # bump-infra-tfvars job.
          persist-credentials: false

      - name: Rewrite engram_image_tag + engram_release_sha defaults in variables.tf
        id: rewrite
        env:
          IMAGE_TAG: ${{ steps.tags.outputs.image_tag }}
          RELEASE_SHA: ${{ steps.tags.outputs.release_sha }}
        run: |
          python3 - <<'PY'
          import os
          import re

          path = "engram-infra/main/envs/prod/variables.tf"
          image_tag = os.environ["IMAGE_TAG"]
          release_sha = os.environ["RELEASE_SHA"]
          gh_output = os.environ["GITHUB_OUTPUT"]

          text = open(path).read()

          # Each rewrite is anchored on the variable block name + must match
          # exactly once. Adding other `default = ` lines elsewhere is safe.
          # Hard-fail on count != 1 — silent shape changes are how the prod
          # task def would diverge from the GitOps source of truth.
          def rewrite(text, var_name, value):
              pattern = re.compile(
                  rf'(variable\s+"{var_name}"[^}}]*?default\s*=\s*)"[^"]*"',
                  re.DOTALL,
              )
              new, count = pattern.subn(rf'\g<1>"{value}"', text)
              if count != 1:
                  raise SystemExit(
                      f"expected exactly 1 {var_name} block, got {count}; "
                      "variables.tf shape changed — adjust the regex"
                  )
              print(f"rewrote {var_name} default → {value}")
              return new

          text = rewrite(text, "engram_image_tag", image_tag)
          text = rewrite(text, "engram_release_sha", release_sha)

          open(path, "w").write(text)
          with open(gh_output, "a") as f:
              f.write("rewrote=true\n")
          PY

          echo "::group::variables.tf after rewrite"
          cat engram-infra/main/envs/prod/variables.tf
          echo "::endgroup::"

      - name: Open / update PR in engram-infra
        id: open-pr
        uses: peter-evans/create-pull-request@v8
        with:
          path: engram-infra
          token: ${{ steps.app-token.outputs.token }}
          # Branch is reused across deploys (matches staging pattern).
          # Each new release force-pushes the branch with the latest
          # sha-tag; a still-open PR is updated in place rather than
          # piling up duplicates.
          branch: bot/bump-engram-prod
          delete-branch: true
          # engram-infra's ruleset enforces required_signatures = true.
          # sign-commits routes through the GraphQL createCommitOnBranch
          # mutation so GitHub auto-signs on behalf of the App.
          sign-commits: true
          commit-message: |
            chore(prod): bump engram image to ${{ steps.tags.outputs.image_tag }}

            Automated bump from engram-app/Engram release ${{ steps.tags.outputs.release }}.
          title: "chore(prod): bump engram image to ${{ steps.tags.outputs.image_tag }}"
          body: |
            Automated bump from engram-app/Engram release `${{ steps.tags.outputs.release }}`.

            Source commit: ${{ github.repository }}@${{ github.sha }}

            Bumps two defaults in `main/envs/prod/variables.tf`:
            - `engram_image_tag` → **`${{ steps.tags.outputs.image_tag }}`** (ECR tag rolled by `terraform (prod)`)
            - `engram_release_sha` → **`${{ steps.tags.outputs.release_sha }}`** (full git SHA — backend Sentry SDK release tag, must match `getsentry/action-release@v3` registration)

            ## What this triggers

            On merge, `.github/workflows/ci.yml` `terraform (prod)` runs `terraform apply -auto-approve`. The new task definition revision pins the engram-saas-prod container image to `${{ vars.AWS_ECR_REPOSITORY || 'engram-saas-prod' }}:${{ steps.tags.outputs.image_tag }}`, and the ECS service rolls onto it.

            ## Review

            Auto-generated; if `variables.tf` has any non-image diff, treat as a regex regression and investigate before merging.
          labels: |
            automated
            tf-image-bump

      - name: Enable auto-merge on bot PR
        # Auto-merge queues the PR for merge once required checks pass.
        # engram-infra has `allow_auto_merge=true` in repos.tf.
        if: steps.open-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.open-pr.outputs.pull-request-number }}
        run: |
          gh pr merge --auto --squash --repo engram-app/engram-infra "$PR_NUMBER"

      - name: Summary
        env:
          PR_NUMBER: ${{ steps.open-pr.outputs.pull-request-number }}
          PR_URL: ${{ steps.open-pr.outputs.pull-request-url }}
        run: |
          {
            echo "## GitOps PR opened"
            echo ""
            echo "- Release tag: \`${{ steps.tags.outputs.release }}\`"
            echo "- Commit: ${{ github.sha }}"
            echo "- Image tag: \`${{ steps.tags.outputs.image_tag }}\`"
            if [ -n "$PR_NUMBER" ]; then
              echo "- engram-infra PR: [#${PR_NUMBER}](${PR_URL}) (auto-merge enabled)"
            else
              echo "- No PR opened (no diff — image already at this tag)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"


      # No Grafana annotation here. This step only opens the image-bump PR
      # in engram-infra — prod hasn't moved yet (the ECS rollout happens
      # ~3-5 min later when that PR merges and engram-infra's
      # `terraform (prod)` apply rolls the service). A marker stamped now
      # would sit minutes before the actual change. The authoritative prod
      # deploy annotation is emitted by engram-infra CI as a REGION spanning
      # the real ECS rollout window (see `terraform (prod)` job +
      # `.github/actions/grafana-annotate`). Deploy progress/failure still
      # surfaces via the Discord notifications above/below.

      # Failure path — same webhook, different framing. `failure()`
      # fires when an earlier step exited non-zero.
      - name: Notify Discord (deploy failed)
        if: failure() && env.WEBHOOK != ''
        env:
          WEBHOOK: ${{ secrets.DISCORD_RELEASES_WEBHOOK_URL }}
          RELEASE: ${{ steps.tags.outputs.release || github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          CONTENT="[DEPLOY-FAILED] \`${RELEASE}\`
          Run: ${RUN_URL}
          Tagged by: ${ACTOR}"
          curl -sS -X POST -H 'Content-Type: application/json' \
            --max-time 5 \
            --data "$(jq -nc --arg c "$CONTENT" '{content:$c}')" \
            "$WEBHOOK"

  create-release-notes:
    # BLOCKED on the real-app proof gate: a red full-Obsidian e2e fails
    # release-e2e-gate → this job is skipped → no orphaned Release ships for a
    # build that never reached prod. The override path still publishes (the gate
    # SUCCEEDS with a ::warning:: on [skip-release-e2e], satisfying needs).
    needs: release-e2e-gate
    # Always create the release-v* GitHub Release — this is the single
    # user-facing release. Body = optional SCHEMA-IMPACT prepend (when any
    # merged PR in the release range carries a phase/* label) + the
    # hand-written CHANGELOG.md section for this version + compare link.
    # release-please's own bare X.Y.Z Release is deleted immediately by the
    # release-please workflow, so this job never gates on either block being
    # non-empty — notes are best-effort, the Release itself always ships.
    runs-on: [self-hosted, linux, x64, isolated]
    permissions:
      contents: write
    env:
      # `gh release create` below is unqualified, and `gh` resolves the repo
      # from `git remote -v`. The runners rewrite github.com/engram-app/ to the
      # LAN git cache via a system-wide url.*.insteadOf, which `git remote -v`
      # displays, so gh sees an unknown host and fails. This step only runs when
      # the release range carries phase/* labels, which is why it has not bitten
      # yet: it is skipped on most releases. Same failure took out an
      # Engram-obsidian release. See the matching note in verify.yml.
      GH_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release range
        id: range
        run: |
          tag="${{ github.ref_name }}"
          # Previous release-v* tag, sorted by version. Exclude the current
          # tag in case sort returns it first (defensive).
          prev=$(git tag -l 'release-v*' --sort=-v:refname | grep -v "^${tag}\$" | head -1)
          if [ -z "$prev" ]; then
            # First release ever — compare against repo root commit.
            prev=$(git rev-list --max-parents=0 HEAD | head -1)
            echo "::notice::No prior release-v* tag — comparing against repo root commit $prev"
          fi
          echo "base_sha=$(git rev-parse "$prev")" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(git rev-parse "$tag")" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$prev" >> "$GITHUB_OUTPUT"

      - name: Generate SCHEMA-IMPACT block
        id: impact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Optional prepend, not a gate — empty output just means no
          # phase/* labels in range, which is a normal release.
          notes=$(bash scripts/generate_schema_impact_notes.sh \
            "${{ steps.range.outputs.base_sha }}" \
            "${{ steps.range.outputs.head_sha }}")
          {
            echo "notes<<IMPACT_EOF"
            echo "$notes"
            echo "IMPACT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG notes for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#release-v}"
          section=""
          if [ -f CHANGELOG.md ]; then
            # Literal substr prefix match (not regex) so "0.5.2" never
            # matches "## [0.5.20]".
            section=$(awk -v v="$VERSION" '
              substr($0,1,length("## [" v "]")) == "## [" v "]" {grab=1; next}
              substr($0,1,length("## " v " ")) == "## " v " "  {grab=1; next}
              /^## / {grab=0}
              grab {print}
            ' CHANGELOG.md)
          fi
          if [ -z "$(echo "$section" | tr -d '[:space:]')" ]; then
            # Missing CHANGELOG.md or no matching section — never fail the
            # release over notes, fall back to a minimal body.
            section="Release ${GITHUB_REF_NAME}."
          fi
          {
            echo "section<<CHANGELOG_EOF"
            echo "$section"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMPACT: ${{ steps.impact.outputs.notes }}
          CHANGELOG_SECTION: ${{ steps.changelog.outputs.section }}
        run: |
          # Pass notes via env vars (not inline args) to avoid bash
          # arg-parsing issues with quotes/special chars in notes.
          # --notes-file is the canonical form.
          notes_file=$(mktemp)
          trap 'rm -f "$notes_file"' EXIT
          {
            if [ -n "$(echo "$IMPACT" | tr -d '[:space:]')" ]; then
              printf '%s\n\n---\n\n' "$IMPACT"
            fi
            printf '%s\n\n---\n\n' "$CHANGELOG_SECTION"
            printf '**Full Changelog:** https://github.com/%s/compare/%s...%s\n' \
              "${{ github.repository }}" "${{ steps.range.outputs.prev_tag }}" "${{ github.ref_name }}"
          } > "$notes_file"
          # Idempotent: a manual rerun (e.g. after a later step in this job
          # failed) must not 422 on a Release that already exists.
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists — skipping create."
          else
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes-file "$notes_file" \
              --target "${{ github.sha }}"
          fi
