name: Deploy frontend

# Builds the saas SPA and deploys it to the Cloudflare Workers static-assets
# host (engram-frontend) on push to main. Mirrors the engram-marketing deploy
# pattern (wrangler deploy from CI, secrets CLOUDFLARE_API_TOKEN +
# CLOUDFLARE_ACCOUNT_ID). The frontend host is NOT Terraform-managed — the
# Worker + its eventual custom domain live in frontend/wrangler.jsonc.
#
# Pre-cutover this deploys to the *.workers.dev URL only (no custom domain in
# wrangler.jsonc yet), so it has zero effect on the live app.engram.page,
# which still serves from the AWS ALB. See
# docs/context/frontend-eject-cloudflare-pages.md.
#
# Required repo config:
#   secrets.CLOUDFLARE_API_TOKEN  — Workers Scripts:Edit on the todd-rasband acct
#   secrets.CLOUDFLARE_ACCOUNT_ID — the Cloudflare account id
#   secrets.VITE_CLERK_PUBLISHABLE_KEY — public Clerk pk_live_… (already set on
#     the repo as a secret; reused here for parity with the existing CI build)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-frontend-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + deploy to Cloudflare Workers
    runs-on: [self-hosted, linux, x64, isolated]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.11 }

      - name: Install
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build (saas)
        working-directory: frontend
        run: bun run build:saas
        env:
          # Public, browser-shipped config — baked into the bundle + config.json.
          VITE_AUTH_PROVIDER: clerk
          VITE_BILLING_ENABLED: 'true'
          VITE_CLERK_WAITLIST_MODE: 'false'
          VITE_API_BASE: https://api.engram.page
          VITE_WS_BASE: wss://api.engram.page
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_GIT_SHA: ${{ github.sha }}

      - name: Deploy (wrangler)
        working-directory: frontend
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
