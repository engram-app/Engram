name: CI

on:
  push:
    # Only fire on conventional branch prefixes + main. Prevents a fork-PR
    # branch (no prefix) from running on self-hosted runners if someone
    # ever fetches one and pushes it to the base repo to test.
    branches:
      - main
      - "bump/**"
      - "chore/**"
      - "dependabot/**"
      - "docs/**"
      - "feat/**"
      - "fix/**"
      - "hotfix/**"
      - "perf/**"
      - "refactor/**"
      - "release/**"
      - "revert/**"
      - "security/**"
      - "test/**"
    # `v*` covers semver release tags applied for marketing/audit.
    # `release-v*` is the deploy trigger — CI already ran on the
    # merge commit the tag points at, no need to rerun (and the
    # version-check job mistakenly fires on the tag because the
    # mix.exs version still matches main).
    tags-ignore: ["v*", "release-v*"]
  repository_dispatch:
    types: [plugin-e2e-trigger]
  workflow_dispatch:
    inputs:
      plugin_branch:
        description: "Plugin branch to test against (default: main)"
        required: false
        default: "main"

permissions:
  contents: read

# No workflow-level concurrency group: backend CI runs in parallel across
# triggers (push + plugin dispatch). Previously serialized because shared
# state collided — that's been addressed:
#   1. Dockerfile cache mounts (`mix-deps`, `mix-build`) now use sharing=locked,
#      so buildkit serializes mount access internally instead of corrupting.
#   2. Xvfb cleanup is scoped to each run's owned display range
#      (`pkill -9 -f "Xvfb :$d"` for $DISPLAY_MIN..$DISPLAY_MAX) so a
#      concurrent e2e-clerk on a different run_number bucket isn't killed.

env:
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"
  # LOCAL_REGISTRY = FastRaid distribution/registry on the engram LAN.
  # Hard-coded at workflow level so every job — including JIT/ephemeral
  # isolated runners that never ran setup-runner.sh — gets the value.
  # The fingerprint marker store (ci-pass / ci-e2e-pass tags) requires it;
  # downstream callers (line ~929, ~2165) used to tolerate unset via shell
  # fallback to Docker Hub — that fallback path is now dead.
  LOCAL_REGISTRY: "10.0.20.214:5000"

  # CI-only encryption master key. Ephemeral — CI databases are recreated per run,
  # so the key does not protect persistent data. Production deploys must override
  # with a secret via `fly secrets set ENCRYPTION_MASTER_KEY=...`.
  #
  # The `||` fallback covers Dependabot PRs, which by GitHub policy don't receive
  # workflow secrets. Without it, `secrets.CI_ENCRYPTION_MASTER_KEY` evaluates to
  # empty string and Phoenix boot crashes with "ENCRYPTION_MASTER_KEY is required
  # when KEY_PROVIDER=local". The fallback is a known constant — no secret value
  # since the CI DB is recreated per run.
  KEY_PROVIDER: "local"
  ENCRYPTION_MASTER_KEY: ${{ secrets.CI_ENCRYPTION_MASTER_KEY || 'ci-dependabot-fallback-key-ephemeral-only-not-secret' }}

jobs:
  # Fingerprint: content-hash of every source path that affects test
  # results. If the same hash already produced a green CI run, downstream
  # test jobs AND the image prebuild skip entirely — build-and-publish-image
  # (on main) runs against the already-validated tree.
  #
  # The merge-to-main commit produced by a squash merge has the same
  # `git ls-tree` output as the PR's head commit — same content, same
  # fingerprint, same cache key.
  fingerprint:
    # Runs on every trigger (push, repository_dispatch, workflow_dispatch).
    # Emits TWO hashes:
    #   - backend-hash: pure backend tree. Gates unit-tests/lint/e2e-local/e2e-browser/deploy.
    #   - e2e-hash:     backend-hash + plugin SHA. Gates e2e-clerk only (the plugin↔backend contract).
    # This lets a plugin-only change (same backend, different plugin SHA) miss the
    # e2e cache and re-run integration, while still hitting the backend cache so
    # pure backend jobs skip.
    runs-on: [self-hosted, linux, x64, isolated]
    outputs:
      backend-hash: ${{ steps.compute.outputs.backend-hash }}
      e2e-hash: ${{ steps.compute.outputs.e2e-hash }}
      backend-cache-hit: ${{ steps.backend-lookup.outputs.cache-hit }}
      e2e-cache-hit: ${{ steps.e2e-lookup.outputs.cache-hit }}
      plugin-sha: ${{ steps.plugin-sha.outputs.sha }}
    steps:
      - name: Generate App token
        id: app-token
        # Dependabot PRs don't receive workflow secrets by GitHub policy,
        # so create-github-app-token errors with "private-key must be set
        # to a non-empty string". Skip this step on Dependabot — the
        # plugin SHA resolution below falls back to unauthenticated calls
        # against the public Engram-obsidian repo, which works fine for
        # Dependabot's low PR volume.
        if: github.actor != 'dependabot[bot]'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.ENGRAM_CI_CLIENT_ID }}
          private-key: ${{ secrets.ENGRAM_CI_APP_PRIVATE_KEY }}
          owner: engram-app
          repositories: Engram-obsidian

      - uses: actions/checkout@v6

      - name: Resolve plugin SHA
        id: plugin-sha
        env:
          DISPATCH_REF: ${{ github.event.client_payload.plugin_ref }}
          EXPLICIT_BRANCH: ${{ inputs.plugin_branch || '' }}
          CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Pin exact plugin commit that downstream e2e-clerk will checkout.
          # Priority matches e2e-clerk's "Checkout plugin" step:
          #   dispatch payload SHA > workflow_dispatch branch > matching branch > main HEAD
          # Failing to resolve a SHA is fatal — cache key would be empty and
          # every run would force a miss, masking the bug.
          #
          # Uses curl (not gh CLI) — the engram-isolated runners don't ship gh
          # on the default PATH for the fingerprint runner image.
          API="https://api.github.com/repos/engram-app/Engram-obsidian"
          # GH_TOKEN is empty on Dependabot PRs (App-token step skipped).
          # Engram-obsidian is public, so unauthenticated GET works; only
          # downside is lower rate limit, which doesn't matter for the
          # weekly Dependabot wave.
          if [ -n "$GH_TOKEN" ]; then
            AUTH=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json")
          else
            AUTH=(-H "Accept: application/vnd.github+json")
          fi

          resolve_sha() {
            curl -fsS "${AUTH[@]}" "${API}/commits/$1" | jq -r '.sha'
          }
          branch_exists() {
            curl -fsS -o /dev/null "${AUTH[@]}" "${API}/branches/$1"
          }

          if [ -n "$DISPATCH_REF" ]; then
            SHA=$(resolve_sha "$DISPATCH_REF")
            SRC="dispatch payload"
          elif [ -n "$EXPLICIT_BRANCH" ] && [ "$EXPLICIT_BRANCH" != "main" ]; then
            SHA=$(resolve_sha "$EXPLICIT_BRANCH")
            SRC="workflow_dispatch input ($EXPLICIT_BRANCH)"
          elif branch_exists "$CURRENT_BRANCH" 2>/dev/null; then
            SHA=$(resolve_sha "$CURRENT_BRANCH")
            SRC="matching branch ($CURRENT_BRANCH)"
          else
            SHA=$(resolve_sha "main")
            SRC="plugin main HEAD"
          fi
          if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
            echo "::error::Could not resolve plugin SHA ($SRC)"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Plugin SHA pinned for this run: $SHA (source: $SRC)"

      - name: Compute content fingerprints
        id: compute
        env:
          PLUGIN_SHA: ${{ steps.plugin-sha.outputs.sha }}
        run: |
          # `git ls-tree -r HEAD -- <paths>` emits `<mode> <type> <sha>\t<path>`
          # per file. Hashing this is content-stable across rebases/squashes.
          # Includes the workflow itself so any CI change forces a full run.
          #
          # mix.exs is hashed SEPARATELY with the version line stripped, so a
          # pure version bump doesn't invalidate the cache. `version-check`
          # still validates the bump on every branch push (not gated on
          # cache-hit), and `build-and-publish-image` keys its skip-or-build
          # decision on whether the new image tag already exists in GHCR —
          # version bump → new tag → fresh image, regardless of cache state.
          MIX_EXS_NO_VERSION=$(grep -vE '^[[:space:]]*version: "[0-9]+\.[0-9]+\.[0-9]+"' mix.exs | sha256sum | cut -d' ' -f1)
          # Root-level lint/format configs are NOT under lib/priv/config/test/frontend,
          # so they need to be listed explicitly. Without them, editing (e.g.)
          # `.credo.exs` to disable a check produces no fingerprint change → the
          # next push hits the cache → `lint` skips → loosened rule rides in
          # without ever being re-validated. `.dockerignore` affects what's
          # in the Docker build context, which can change image bytes.
          BACKEND_HASH=$({
            git ls-tree -r HEAD -- \
              lib priv config test frontend \
              Dockerfile entrypoint.sh .dockerignore \
              mix.lock \
              .formatter.exs .credo.exs .dialyzer_ignore.exs .sobelow-conf \
              docker-compose.ci.yml docker-compose.ci-local.yml docker-compose.ci-database.yml \
              .github/workflows/verify.yml
            echo "mix.exs-no-version:$MIX_EXS_NO_VERSION"
          } | sha256sum | cut -d' ' -f1)
          # The e2e harness tree (helpers, fixtures, tests). Including it in
          # the e2e hash means an e2e-only change (test fix, helper tweak)
          # invalidates the e2e cache and forces e2e-clerk to actually run
          # — without this, an e2e fix could ride the previous green's
          # cache and never execute its own change. Excluded from
          # BACKEND_HASH so backend jobs aren't re-run for pure-e2e edits.
          E2E_TREE_HASH=$(git ls-tree -r HEAD -- e2e | sha256sum | cut -d' ' -f1)
          # E2E hash mixes backend + plugin SHA + e2e tree so a plugin-only
          # or e2e-only change invalidates the integration cache without
          # touching the pure-backend cache.
          E2E_HASH=$(printf '%s:%s:%s' "$BACKEND_HASH" "$PLUGIN_SHA" "$E2E_TREE_HASH" | sha256sum | cut -d' ' -f1)
          echo "backend-hash=$BACKEND_HASH" >> "$GITHUB_OUTPUT"
          echo "e2e-hash=$E2E_HASH" >> "$GITHUB_OUTPUT"
          echo "Backend fingerprint: $BACKEND_HASH"
          echo "E2E fingerprint:     $E2E_HASH (backend + plugin $PLUGIN_SHA)"

      # Marker store = FastRaid local Docker registry (LOCAL_REGISTRY), NOT
      # actions/cache. actions/cache scopes entries to the writing ref +
      # default branch, so a PR run's marker (saved on `feat/foo`) was NEVER
      # visible to the subsequent `main` push triggered by squash-merge —
      # the merge re-ran full CI even though content was unchanged. The
      # registry is ref-agnostic: a HEAD against /v2/ci-pass/manifests/<hash>
      # returns 200 regardless of which branch pushed the tag.
      #
      # No auth — registry is insecure HTTP, intra-LAN only, already trusted
      # by every runner's docker daemon (.github/setup-runner.sh).
      - name: Look up prior backend pass
        id: backend-lookup
        env:
          BACKEND_HASH: ${{ steps.compute.outputs.backend-hash }}
        run: |
          if [ -z "${LOCAL_REGISTRY:-}" ]; then
            echo "::warning::LOCAL_REGISTRY unset — fingerprint short-circuit disabled"
            echo "cache-hit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if curl -fsS -o /dev/null --max-time 5 -I \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "http://${LOCAL_REGISTRY}/v2/ci-pass/manifests/${BACKEND_HASH}"; then
            echo "cache-hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "cache-hit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Look up prior e2e pass
        id: e2e-lookup
        env:
          E2E_HASH: ${{ steps.compute.outputs.e2e-hash }}
        run: |
          if [ -z "${LOCAL_REGISTRY:-}" ]; then
            echo "cache-hit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if curl -fsS -o /dev/null --max-time 5 -I \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "http://${LOCAL_REGISTRY}/v2/ci-e2e-pass/manifests/${E2E_HASH}"; then
            echo "cache-hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "cache-hit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report decision
        run: |
          echo "Backend cache-hit: ${{ steps.backend-lookup.outputs.cache-hit }} (hash ${{ steps.compute.outputs.backend-hash }})"
          echo "E2E cache-hit:     ${{ steps.e2e-lookup.outputs.cache-hit }} (hash ${{ steps.compute.outputs.e2e-hash }})"
          if [ "${{ steps.backend-lookup.outputs.cache-hit }}" = "true" ] && [ "${{ steps.e2e-lookup.outputs.cache-hit }}" = "true" ]; then
            echo "::notice::Both fingerprints already proved green — all test jobs will skip"
          elif [ "${{ steps.backend-lookup.outputs.cache-hit }}" = "true" ]; then
            echo "::notice::Backend already green; only e2e-clerk will run (plugin SHA changed)"
          elif [ "${{ steps.e2e-lookup.outputs.cache-hit }}" = "true" ]; then
            echo "::notice::E2E pairing already green; backend-only jobs will run"
          else
            echo "Neither fingerprint cached — running full test suite"
          fi

  # Build the CI engram image ONCE per CI run. All e2e-* jobs share the
  # same docker daemon on this VM, so a single `docker tag` makes the
  # image visible to every downstream runner without registry push.
  # Image tag = content-stable hash of Dockerfile inputs; identical trees
  # short-circuit via `docker image inspect`.
  prebuild-ci-image:
    needs: fingerprint
    # Image consumed by e2e-clerk (any trigger, gated on e2e-cache-hit) and
    # e2e-local (push/workflow_dispatch only, gated on backend-cache-hit).
    # Build whenever at least one consumer will run.
    if: |
      needs.fingerprint.outputs.e2e-cache-hit != 'true'
      || (github.event_name != 'repository_dispatch' && needs.fingerprint.outputs.backend-cache-hit != 'true')
    runs-on: [self-hosted, linux, x64, isolated]
    outputs:
      image: ${{ steps.tag.outputs.image }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag
        id: tag
        run: |
          HASH=$(git ls-tree -r HEAD -- \
            Dockerfile entrypoint.sh \
            mix.exs mix.lock \
            config lib priv frontend \
            | sha256sum | cut -c1-12)
          IMAGE="engram-ci:${HASH}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Image tag: $IMAGE"

      - name: Build image (skip if already cached on this daemon)
        env:
          IMAGE: ${{ steps.tag.outputs.image }}
          # Use buildx's plain progress writer instead of the fancy tty printer.
          # The latter races on `--load`/LoadImage: a progress goroutine writes
          # to a closed channel and panics *after* the image built fine, failing
          # the job (issue #334, upstream docker/buildx bug). Plain writer = no
          # such goroutine.
          BUILDKIT_PROGRESS: plain
        run: |
          if docker image inspect "$IMAGE" >/dev/null 2>&1; then
            echo "::notice::Image $IMAGE already cached locally — skipping build"
            exit 0
          fi
          ENGRAM_CI_IMAGE="$IMAGE" \
            docker compose -f docker-compose.ci.yml build engram
          docker image inspect "$IMAGE" >/dev/null
          echo "Built and tagged $IMAGE"

  # Compile Elixir code ONCE in both :dev and :test envs, cache deps and
  # _build artifacts. Downstream jobs (unit-tests, lint, e2e-browser) all
  # do their own `mix compile` today — three redundant compiles of the
  # same 143 source files. This job front-loads the work and exports
  # cache keys; downstream jobs restore via actions/cache before any mix
  # command, making compile incremental (or instant on cache hit).
  prebuild-mix:
    needs: fingerprint
    # Consumed by unit-tests, lint, e2e-browser — all backend-only and skipped
    # on plugin dispatch.
    if: github.event_name != 'repository_dispatch' && needs.fingerprint.outputs.backend-cache-hit != 'true'
    runs-on: [self-hosted, linux, x64, isolated]
    outputs:
      beam-tag: ${{ steps.beam.outputs.tag }}
      deps-key: ${{ steps.keys.outputs.deps }}
      build-dev-key: ${{ steps.keys.outputs.build-dev }}
      build-test-key: ${{ steps.keys.outputs.build-test }}
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false  # Preserve _build/ + deps/ for incremental compile

      - name: Resolve OTP/Elixir version
        id: beam
        run: |
          OTP=$(erl -eval 'io:format("~s",[erlang:system_info(otp_release)]),halt()' -noshell)
          ERTS=$(erl -eval 'io:format("~s",[erlang:system_info(version)]),halt()' -noshell)
          ELX=$(elixir --short-version)
          echo "tag=otp${OTP}-erts${ERTS}-elx${ELX}" >> "$GITHUB_OUTPUT"

      - name: Compute cache keys
        id: keys
        env:
          BEAM: ${{ steps.beam.outputs.tag }}
        run: |
          # BEAM files are tied to OTP version — include in every key.
          # _build keys hash the source content the compiler actually
          # reads. :test additionally hashes test/** because that's part
          # of its compile scope; :dev does not.
          DEPS_KEY="mix-deps-${BEAM}-${{ hashFiles('mix.lock') }}"
          DEV_KEY="mix-build-dev-${BEAM}-${{ hashFiles('mix.lock', 'lib/**', 'config/**', 'priv/**') }}"
          TEST_KEY="mix-build-test-${BEAM}-${{ hashFiles('mix.lock', 'lib/**', 'config/**', 'priv/**', 'test/**') }}"
          echo "deps=$DEPS_KEY" >> "$GITHUB_OUTPUT"
          echo "build-dev=$DEV_KEY" >> "$GITHUB_OUTPUT"
          echo "build-test=$TEST_KEY" >> "$GITHUB_OUTPUT"

      - name: Cache deps/
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ steps.keys.outputs.deps }}
          restore-keys: mix-deps-${{ steps.beam.outputs.tag }}-

      - name: Cache _build/dev
        id: cache-build-dev
        uses: actions/cache@v5
        with:
          path: _build/dev
          key: ${{ steps.keys.outputs.build-dev }}
          restore-keys: mix-build-dev-${{ steps.beam.outputs.tag }}-

      - name: Cache _build/test
        id: cache-build-test
        uses: actions/cache@v5
        with:
          path: _build/test
          key: ${{ steps.keys.outputs.build-test }}
          restore-keys: mix-build-test-${{ steps.beam.outputs.tag }}-

      - name: Fetch deps (if missing or lockfile changed)
        # Don't gate on `[ -d deps ]` — the cache's `restore-keys`
        # fallback can populate deps/ from a stale cache when the
        # exact-key match fails (e.g. after a mix.lock change). Use
        # the cache step's `cache-hit` output, which is 'true' only
        # on exact match; restore-keys partial hits set it to ''.
        # On a partial hit, `mix deps.get` reconciles the lockfile
        # against the restored deps/ and fetches the delta.
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: mix deps.get

      - name: Compile :dev
        env:
          MIX_ENV: dev
        run: |
          # --warnings-as-errors here means the lint job downstream can
          # skip its own --force compile (cache restore + this proven
          # warning-free build = same guarantee).
          mix compile --warnings-as-errors

      - name: Compile :test
        env:
          MIX_ENV: test
        run: |
          mix compile --warnings-as-errors

  version-check:
    # Skip on Dependabot PRs — they can't bump app version, and the `ci`
    # aggregate already treats `skipped` as OK for version-check.
    if: github.event_name == 'push' && github.ref != 'refs/heads/main' && github.actor != 'dependabot[bot]'
    runs-on: [self-hosted, linux, x64, isolated]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require version bump vs main
        run: |
          BRANCH_VERSION=$(grep 'version:' mix.exs | head -1 | sed 's/.*"\(.*\)".*/\1/')
          MAIN_VERSION=$(git show origin/main:mix.exs | grep 'version:' | head -1 | sed 's/.*"\(.*\)".*/\1/')

          if [ "$BRANCH_VERSION" = "$MAIN_VERSION" ]; then
            echo "::error::mix.exs version ($BRANCH_VERSION) has not been bumped from main. Bump the version before merging."
            exit 1
          fi
          echo "Version bumped: $MAIN_VERSION → $BRANCH_VERSION"

  e2e-clerk:
    needs: [fingerprint, prebuild-ci-image]
    # e2e-clerk is the plugin↔backend contract test. Skip when:
    #   - the exact (backend, plugin) pair has already passed (cache hit), OR
    #   - this is a Dependabot PR (needs Clerk + App secrets that GitHub doesn't
    #     provide to Dependabot; the contract-test value is marginal for dep
    #     bumps and the same coverage runs when we merge into main).
    # `ci` aggregate updated below to allow this job's `skipped` result on
    # Dependabot PRs.
    if: needs.fingerprint.outputs.e2e-cache-hit != 'true' && github.actor != 'dependabot[bot]'
    runs-on: [self-hosted, linux, x64, isolated]

    env:
      CI_PROJECT: engram-ci-${{ github.run_id }}
      QDRANT_COLLECTION: ci_test_${{ github.run_id }}
      MARKER_PREFIX: /tmp/ci-${{ github.run_id }}
      E2E_VAULT_PREFIX: /tmp/e2e-vault-${{ github.run_id }}
      E2E_CONFIG_PREFIX: /tmp/e2e-obsidian-config-${{ github.run_id }}
      ENGRAM_CI_IMAGE: ${{ needs.prebuild-ci-image.outputs.image }}

    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.ENGRAM_CI_CLIENT_ID }}
          private-key: ${{ secrets.ENGRAM_CI_APP_PRIVATE_KEY }}
          owner: engram-app
          repositories: Engram-obsidian

      # ------------------------------------------------------------------
      # Cleanup + checkout (both repos)
      # ------------------------------------------------------------------
      - name: Compute display range for this run
        id: display
        run: |
          # Display range is deterministic per GITHUB_RUN_NUMBER so two parallel
          # runs with different run_numbers (modulo 15) get non-overlapping
          # 6-display windows. Pre-cleanup and tear-down both need this range
          # so they can scope Xvfb kills to displays this run actually owns.
          BASE=$(( (GITHUB_RUN_NUMBER % 15) * 6 + 50 ))
          MIN=$((BASE - 5))
          MAX=$BASE
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "min=$MIN" >> "$GITHUB_OUTPUT"
          echo "max=$MAX" >> "$GITHUB_OUTPUT"
          echo "Display range owned by this run: :$MIN..:$MAX"

      - name: Pre-cleanup stale resources
        env:
          DISPLAY_MIN: ${{ steps.display.outputs.min }}
          DISPLAY_MAX: ${{ steps.display.outputs.max }}
        run: |
          docker compose -f docker-compose.ci.yml -p "$CI_PROJECT" down -v --remove-orphans 2>/dev/null || true
          pkill -9 -f "$E2E_CONFIG_PREFIX" 2>/dev/null || true
          # Orphan Xvfb cleanup is scoped to THIS run's display range only,
          # so a concurrent e2e-clerk on a different run_number bucket isn't
          # killed mid-test. Xvfb processes match via the `:N` arg on the
          # command line; lock files live at /tmp/.X{N}-lock and the socket
          # at /tmp/.X11-unix/X{N}.
          for d in $(seq "$DISPLAY_MIN" "$DISPLAY_MAX"); do
            pkill -9 -f "Xvfb :$d" 2>/dev/null || true
            rm -f "/tmp/.X${d}-lock" "/tmp/.X11-unix/X${d}" 2>/dev/null || true
          done
          sleep 1
          rm -rf ${E2E_VAULT_PREFIX}-* ${E2E_CONFIG_PREFIX}-* ${MARKER_PREFIX}-*
          # Sparse-checkout leak recovery. Cross-repo plugin checkouts and the
          # obsidian-update workflow can leave `core.sparseCheckout=true` and
          # skip-worktree bits on the shared workspace index. `git sparse-checkout
          # disable` clears the config but NOT the index bits, so a subsequent
          # `actions/checkout@v6 --clean:false` lands an empty working tree
          # (mix.exs missing, etc.). Nuke `.git` when poison is detected so the
          # next checkout reclones cleanly. Untracked caches (_build/, deps/,
          # node_modules/) survive — they live outside .git.
          if [ -d .git ] && { [ -f .git/info/sparse-checkout ] || [ "$(git config --get core.sparseCheckout 2>/dev/null)" = "true" ]; }; then
            echo "::warning::Sparse-checkout leak detected — removing .git for fresh clone"
            rm -rf .git
          fi

      - uses: actions/checkout@v6
        with:
          clean: false  # Preserve _build/ and deps/ for incremental compilation

      - name: Checkout plugin
        env:
          EXPLICIT_BRANCH: ${{ inputs.plugin_branch || github.event.client_payload.plugin_branch || '' }}
          CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
          PLUGIN_SHA: ${{ needs.fingerprint.outputs.plugin-sha }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Branch is used only to scope the fetch; the final checkout pins
          # the exact PLUGIN_SHA resolved by the `fingerprint` job. This
          # guarantees the tested commit matches the e2e cache key even if
          # the upstream branch moves between fingerprint and this step.
          # curl (not gh CLI) — engram-isolated runners don't ship gh on PATH.
          if [ -n "$EXPLICIT_BRANCH" ] && [ "$EXPLICIT_BRANCH" != "main" ]; then
            BRANCH="$EXPLICIT_BRANCH"
          elif curl -fsS -o /dev/null \
                 -H "Authorization: Bearer ${GH_TOKEN}" \
                 -H "Accept: application/vnd.github+json" \
                 "https://api.github.com/repos/engram-app/Engram-obsidian/branches/$CURRENT_BRANCH" 2>/dev/null; then
            BRANCH="$CURRENT_BRANCH"
            echo "🔗 Auto-linked plugin branch: $BRANCH"
          else
            BRANCH="main"
          fi
          echo "Plugin: $BRANCH @ $PLUGIN_SHA"
          if [ -d plugin-src/.git ]; then
            cd plugin-src
            git checkout -- .
            git clean -fd
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "$PLUGIN_SHA"
          else
            git clone --branch "$BRANCH" --single-branch \
              "https://x-access-token:${GH_TOKEN}@github.com/engram-app/Engram-obsidian.git" plugin-src
            cd plugin-src
            git checkout "$PLUGIN_SHA"
          fi

      # ------------------------------------------------------------------
      # Launch ALL long-running prep in parallel (background)
      # ------------------------------------------------------------------
      - name: Allocate dynamic ports
        id: ports
        env:
          DISPLAY_BASE: ${{ steps.display.outputs.base }}
        run: |
          get_free_port() {
            python3 -c "import socket; s=socket.socket(); s.bind(('',0)); print(s.getsockname()[1]); s.close()"
          }
          ENGRAM_PORT=$(get_free_port)
          PG_PORT=$(get_free_port)
          # CDP ports: 3 Obsidian instances × 2 xdist workers = 6 ports total.
          # Per-worker env vars (E2E_CDP_PORT_A_W{0,1} etc) are consumed by
          # e2e/conftest.py so dynamic (non-contiguous) allocation is safe.
          CDP_PORT_A_W0=$(get_free_port)
          CDP_PORT_B_W0=$(get_free_port)
          CDP_PORT_C_W0=$(get_free_port)
          CDP_PORT_A_W1=$(get_free_port)
          CDP_PORT_B_W1=$(get_free_port)
          CDP_PORT_C_W1=$(get_free_port)
          # DISPLAY_BASE comes from the earlier "Compute display range" step so
          # pre-cleanup and tear-down can scope Xvfb kills consistently.

          # Validate all ports are non-empty (get_free_port can fail silently)
          for var in ENGRAM_PORT PG_PORT \
                     CDP_PORT_A_W0 CDP_PORT_B_W0 CDP_PORT_C_W0 \
                     CDP_PORT_A_W1 CDP_PORT_B_W1 CDP_PORT_C_W1; do
            if [ -z "${!var}" ]; then
              echo "::error::Port allocation failed for $var"
              exit 1
            fi
          done

          {
            echo "engram_port=$ENGRAM_PORT"
            echo "pg_port=$PG_PORT"
            echo "cdp_port_a_w0=$CDP_PORT_A_W0"
            echo "cdp_port_b_w0=$CDP_PORT_B_W0"
            echo "cdp_port_c_w0=$CDP_PORT_C_W0"
            echo "cdp_port_a_w1=$CDP_PORT_A_W1"
            echo "cdp_port_b_w1=$CDP_PORT_B_W1"
            echo "cdp_port_c_w1=$CDP_PORT_C_W1"
            echo "display_base=$DISPLAY_BASE"
          } >> "$GITHUB_OUTPUT"
          echo "Ports: engram=$ENGRAM_PORT pg=$PG_PORT"
          echo "  w0 cdp: $CDP_PORT_A_W0 $CDP_PORT_B_W0 $CDP_PORT_C_W0"
          echo "  w1 cdp: $CDP_PORT_A_W1 $CDP_PORT_B_W1 $CDP_PORT_C_W1"
          echo "  display base :$DISPLAY_BASE (uses :$DISPLAY_BASE..:$((DISPLAY_BASE-5)))"

      - name: "Background: CI stack + plugin build + Playwright + Ollama + Qdrant"
        env:
          CLERK_JWKS_URL: ${{ secrets.CLERK_JWKS_URL }}
          CLERK_ISSUER: ${{ secrets.CLERK_ISSUER }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          CI_ENGRAM_PORT: ${{ steps.ports.outputs.engram_port }}
          CI_PG_PORT: ${{ steps.ports.outputs.pg_port }}
          QDRANT_COLLECTION: ${{ env.QDRANT_COLLECTION }}
        run: |
          # --- CI stack build + start (background) ---
          (
            # Cap Docker build cache (--mount=type=cache grows unbounded)
            docker builder prune --all --keep-storage=2gb -f 2>/dev/null || true

            # Clean up stale CI collection on SlowRaid Qdrant before starting
            curl -sf -X DELETE "http://10.0.20.201:6333/collections/${QDRANT_COLLECTION}" > /dev/null 2>&1 || true

            # Image was already built by the `prebuild-ci-image` job.
            # ENGRAM_CI_IMAGE pins docker-compose.ci.yml's `image:` to that
            # exact tag. `--no-build` makes startup fail loudly if the tag
            # is missing (regression detector vs a silent rebuild).
            docker compose -f docker-compose.ci.yml -p "$CI_PROJECT" up -d --no-build --wait

            # Quick verification — compose --wait already confirmed healthcheck,
            # this just confirms the port mapping is reachable from the host
            for i in $(seq 1 15); do
              if curl -sf "http://localhost:${CI_ENGRAM_PORT}/api/health" > /dev/null 2>&1; then
                echo "CI stack healthy on port ${CI_ENGRAM_PORT}"
                touch "${MARKER_PREFIX}-stack.marker"
                break
              fi
              sleep 1
            done
            if [ ! -f "${MARKER_PREFIX}-stack.marker" ]; then
              echo "ERROR: CI stack failed to start" >&2
              touch "${MARKER_PREFIX}-stack-failed.marker"
            fi
          ) > "${MARKER_PREFIX}-stack.log" 2>&1 &
          echo "CI stack build started (PID $!)"

          # --- Plugin build (background) ---
          (
            if [ -x "$HOME/.bun/bin/bun" ]; then
              echo "bun already installed: $($HOME/.bun/bin/bun --version)"
            else
              curl -fsSL https://bun.sh/install | bash
            fi
            export PATH="$HOME/.bun/bin:$PATH"
            cd plugin-src
            bun install --frozen-lockfile --registry http://10.0.20.214:4873
            bun run build
            # Verify build
            if [ -f main.js ] && [ -f manifest.json ]; then
              touch "${MARKER_PREFIX}-plugin.marker"
              echo "Plugin build OK: $(ls -la main.js)"
            else
              echo "ERROR: Plugin build failed — missing main.js or manifest.json" >&2
              touch "${MARKER_PREFIX}-plugin-failed.marker"
            fi
          ) > "${MARKER_PREFIX}-plugin.log" 2>&1 &
          echo "Plugin build started (PID $!)"

          # --- Playwright install (background) ---
          (
            if python3 -c "from playwright.sync_api import sync_playwright" 2>/dev/null && \
               ls -d "$HOME/.cache/ms-playwright/chromium-"* > /dev/null 2>&1; then
              echo "Playwright + Chromium already installed, skipping"
            else
              pip install 'playwright>=1.48'
              python3 -m playwright install chromium
            fi
            touch "${MARKER_PREFIX}-playwright.marker"
          ) > "${MARKER_PREFIX}-playwright.log" 2>&1 &
          echo "Playwright install started (PID $!)"

          # --- Ollama reachability check (background) ---
          (
            if curl -sf http://10.0.20.214:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama OK"
              touch "${MARKER_PREFIX}-ollama.marker"
            else
              echo "WARNING: Ollama on FastRaid not reachable — embedding tests may fail"
              touch "${MARKER_PREFIX}-ollama-warn.marker"
            fi
          ) > "${MARKER_PREFIX}-ollama.log" 2>&1 &
          echo "Ollama check started (PID $!)"

          # --- Qdrant reachability check (background) ---
          # SlowRaid (10.0.20.201) hosts persistent Qdrant with AVX2 for binary quantization.
          # Runner VM (10.20.99.x) → SlowRaid host has intermittent connectivity (shim-br0 /
          # MASQUERADE routing race per docs/context/runner-vm-setup.md gotcha #1). A single-shot
          # probe sometimes fails even though Qdrant is up — retry 6× over 30s before giving up.
          (
            ok=false
            for attempt in $(seq 1 6); do
              if curl -sf --max-time 5 http://10.0.20.201:6333/healthz > /dev/null 2>&1; then
                echo "Qdrant OK (SlowRaid AVX2) — attempt ${attempt}"
                ok=true
                break
              fi
              echo "attempt ${attempt}: Qdrant probe failed; retrying in 5s…"
              sleep 5
            done
            if $ok; then
              touch "${MARKER_PREFIX}-qdrant.marker"
            else
              echo "ERROR: Qdrant on SlowRaid not reachable after 6 attempts — binary quantization tests will fail"
              touch "${MARKER_PREFIX}-qdrant-failed.marker"
            fi
          ) > "${MARKER_PREFIX}-qdrant.log" 2>&1 &
          echo "Qdrant check started (PID $!)"

      # ------------------------------------------------------------------
      # Wait for all background tasks
      # ------------------------------------------------------------------
      - name: Wait for CI stack + plugin + Playwright + Ollama + Qdrant
        run: |
          echo "Waiting for CI stack..."
          for i in $(seq 1 300); do
            if [ -f "${MARKER_PREFIX}-stack.marker" ]; then echo "CI stack ready"; break; fi
            if [ -f "${MARKER_PREFIX}-stack-failed.marker" ]; then
              echo "CI stack failed to start. Logs:"; cat "${MARKER_PREFIX}-stack.log"; exit 1
            fi
            sleep 1
          done
          if [ ! -f "${MARKER_PREFIX}-stack.marker" ]; then
            echo "CI stack timed out (5 min). Logs:"; cat "${MARKER_PREFIX}-stack.log"; exit 1
          fi

          echo "Waiting for plugin build..."
          for i in $(seq 1 300); do
            if [ -f "${MARKER_PREFIX}-plugin.marker" ]; then echo "Plugin ready"; break; fi
            if [ -f "${MARKER_PREFIX}-plugin-failed.marker" ]; then
              echo "Plugin build failed. Logs:"; cat "${MARKER_PREFIX}-plugin.log"; exit 1
            fi
            sleep 1
          done
          if [ ! -f "${MARKER_PREFIX}-plugin.marker" ]; then
            echo "Plugin build timed out. Logs:"; cat "${MARKER_PREFIX}-plugin.log"; exit 1
          fi

          echo "Waiting for Playwright..."
          for i in $(seq 1 300); do
            if [ -f "${MARKER_PREFIX}-playwright.marker" ]; then echo "Playwright ready"; break; fi
            sleep 1
          done
          if [ ! -f "${MARKER_PREFIX}-playwright.marker" ]; then
            echo "Playwright install timed out. Logs:"; cat "${MARKER_PREFIX}-playwright.log"; exit 1
          fi

          echo "Waiting for Ollama check..."
          for i in $(seq 1 30); do
            if [ -f "${MARKER_PREFIX}-ollama.marker" ] || [ -f "${MARKER_PREFIX}-ollama-warn.marker" ]; then break; fi
            sleep 1
          done
          if [ -f "${MARKER_PREFIX}-ollama-warn.marker" ]; then
            cat "${MARKER_PREFIX}-ollama.log"
          elif [ -f "${MARKER_PREFIX}-ollama.marker" ]; then
            echo "Ollama OK"
          else
            echo "WARNING: Ollama check timed out. Logs:"; cat "${MARKER_PREFIX}-ollama.log" 2>/dev/null || true
          fi

          echo "Waiting for Qdrant check..."
          for i in $(seq 1 15); do
            if [ -f "${MARKER_PREFIX}-qdrant.marker" ]; then echo "Qdrant OK"; break; fi
            if [ -f "${MARKER_PREFIX}-qdrant-failed.marker" ]; then
              echo "ERROR: Qdrant on SlowRaid (10.0.20.201) not reachable. Logs:"
              cat "${MARKER_PREFIX}-qdrant.log"
              exit 1
            fi
            sleep 1
          done
          if [ ! -f "${MARKER_PREFIX}-qdrant.marker" ] && [ ! -f "${MARKER_PREFIX}-qdrant-failed.marker" ]; then
            echo "ERROR: Qdrant check timed out. Logs:"; cat "${MARKER_PREFIX}-qdrant.log" 2>/dev/null || true; exit 1
          fi

          # Add bun to PATH for E2E tests (already installed by plugin build)
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      # ------------------------------------------------------------------
      # API-only tests (run while Obsidian instances boot)
      # ------------------------------------------------------------------
      - name: "Run API-only tests"
        working-directory: e2e
        run: python3 -m pytest tests/api_only/ --ignore=tests/api_only/local -v --timeout=180 -p no:cacheprovider --no-header
        env:
          ENGRAM_API_URL: http://localhost:${{ steps.ports.outputs.engram_port }}/api
          ENGRAM_PLUGIN_SRC: ${{ github.workspace }}/plugin-src
          E2E_CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
          AUTH_PROVIDER: clerk
          CI_POSTGRES_CONTAINER: ${{ env.CI_PROJECT }}-postgres-1
          CI_MINIO_CONTAINER: ${{ env.CI_PROJECT }}-minio-1
          QDRANT_URL: http://10.0.20.201:6333
          QDRANT_COLLECTION: ${{ env.QDRANT_COLLECTION }}
          OLLAMA_URL: http://10.0.20.214:11434

      # ------------------------------------------------------------------
      # Obsidian E2E tests
      # ------------------------------------------------------------------
      - name: "Run Obsidian E2E tests"
        if: always()
        working-directory: e2e
        # -n 2 --dist=loadfile: two xdist workers, each owns whole test files
        # (preserves intra-file ordering for test_31 restart + test_50 smoke).
        # E2E_WORKERS defaults to 2 but can be overridden to 1 for rollback.
        run: |
          python3 -m pytest tests/ --ignore=tests/api_only/ \
            -n "${E2E_WORKERS:-2}" --dist=loadfile \
            -v --timeout=300 -p no:cacheprovider --no-header
        env:
          ENGRAM_API_URL: http://localhost:${{ steps.ports.outputs.engram_port }}/api
          ENGRAM_PLUGIN_SRC: ${{ github.workspace }}/plugin-src
          CI_POSTGRES_CONTAINER: ${{ env.CI_PROJECT }}-postgres-1
          CI_MINIO_CONTAINER: ${{ env.CI_PROJECT }}-minio-1
          E2E_CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
          AUTH_PROVIDER: clerk
          E2E_VAULT_PREFIX: ${{ env.E2E_VAULT_PREFIX }}
          E2E_CONFIG_PREFIX: ${{ env.E2E_CONFIG_PREFIX }}
          E2E_CDP_PORT_A_W0: ${{ steps.ports.outputs.cdp_port_a_w0 }}
          E2E_CDP_PORT_B_W0: ${{ steps.ports.outputs.cdp_port_b_w0 }}
          E2E_CDP_PORT_C_W0: ${{ steps.ports.outputs.cdp_port_c_w0 }}
          E2E_CDP_PORT_A_W1: ${{ steps.ports.outputs.cdp_port_a_w1 }}
          E2E_CDP_PORT_B_W1: ${{ steps.ports.outputs.cdp_port_b_w1 }}
          E2E_CDP_PORT_C_W1: ${{ steps.ports.outputs.cdp_port_c_w1 }}
          E2E_DISPLAY_BASE: ${{ steps.ports.outputs.display_base }}

      # ------------------------------------------------------------------
      # Report E2E status back to the plugin repo (dispatch only)
      # ------------------------------------------------------------------
      - name: Report E2E status to plugin repo
        if: always() && github.event_name == 'repository_dispatch'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SHORT_SHA="${{ github.event.client_payload.plugin_ref }}"
          if [ -z "$SHORT_SHA" ]; then
            echo "No plugin_ref in payload, skipping status report"
            exit 0
          fi
          # curl (not gh CLI) — engram-isolated runners don't ship gh on PATH.
          API="https://api.github.com/repos/engram-app/Engram-obsidian"
          AUTH=(-H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json")
          # Resolve to full 40-char SHA (short SHAs from manual dispatches won't work)
          PLUGIN_SHA=$(curl -fsS "${AUTH[@]}" "${API}/commits/${SHORT_SHA}" | jq -r '.sha')
          # Determine overall E2E result from prior steps
          if [ "${{ job.status }}" = "success" ]; then
            STATE="success"
            DESC="E2E tests passed"
          else
            STATE="failure"
            DESC="E2E tests failed"
          fi
          curl -fsS -X POST "${AUTH[@]}" "${API}/statuses/${PLUGIN_SHA}" \
            -d "$(jq -nc --arg state "$STATE" --arg context "backend/e2e" --arg description "$DESC" --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
                  '{state:$state, context:$context, description:$description, target_url:$target_url}')"

      # ------------------------------------------------------------------
      # Cleanup — MUST kill everything, even on cancel/failure
      # ------------------------------------------------------------------
      - name: Collect failure logs
        if: failure()
        run: |
          mkdir -p ci-artifacts
          docker compose -f docker-compose.ci.yml -p "$CI_PROJECT" logs > ci-artifacts/docker-compose.log 2>&1
          cp ${MARKER_PREFIX}-*.log ci-artifacts/ 2>/dev/null || true
          # Pytest detailed log (captures DEBUG+ from all helpers)
          cp e2e/pytest-e2e.log ci-artifacts/ 2>/dev/null || true
          for v in ${E2E_VAULT_PREFIX}-*; do
            [ -d "$v" ] && tar czf "ci-artifacts/$(basename $v).tar.gz" -C /tmp "$(basename $v)" 2>/dev/null || true
          done

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-debug-${{ github.sha }}
          path: ci-artifacts/
          retention-days: 7

      - name: Tear down
        if: always()
        env:
          DISPLAY_MIN: ${{ steps.display.outputs.min }}
          DISPLAY_MAX: ${{ steps.display.outputs.max }}
        run: |
          # Delete this run's Qdrant collection on SlowRaid
          curl -sf -X DELETE "http://10.0.20.201:6333/collections/${QDRANT_COLLECTION}" > /dev/null 2>&1 || true
          # Kill only this run's Obsidian/Xvfb processes (scoped by config dir)
          pkill -9 -f "$E2E_CONFIG_PREFIX" 2>/dev/null || true
          # Xvfb command line doesn't contain $E2E_CONFIG_PREFIX, so kill it
          # by the display number we own. Scope is mandatory now that the
          # workflow can run in parallel — blanket pkill would nuke neighbors.
          for d in $(seq "$DISPLAY_MIN" "$DISPLAY_MAX"); do
            pkill -9 -f "Xvfb :$d" 2>/dev/null || true
          done
          # Wait for processes to die before removing their dirs
          sleep 1
          for d in $(seq "$DISPLAY_MIN" "$DISPLAY_MAX"); do
            rm -f "/tmp/.X${d}-lock" "/tmp/.X11-unix/X${d}" 2>/dev/null || true
          done
          # Remove only this run's temp dirs + marker files
          rm -rf ${E2E_VAULT_PREFIX}-* ${E2E_CONFIG_PREFIX}-* ${MARKER_PREFIX}-*
          # Tear down only this run's Docker stack
          docker compose -f docker-compose.ci.yml -p "$CI_PROJECT" down -v --remove-orphans --rmi local 2>/dev/null || true
          # Prune dangling images + volumes to reclaim disk
          docker image prune -f 2>/dev/null || true
          docker volume prune -f 2>/dev/null || true
          # Keep only the 3 most recent engram-ci cache tags
          docker images --format '{{.Repository}}:{{.Tag}}' --filter "reference=engram-ci:*" \
            | tail -n +4 | xargs -r docker rmi 2>/dev/null || true
          # Clean up ci-artifacts and stale Bun native cache files
          rm -rf ci-artifacts/
          find /tmp -maxdepth 1 -name '.ff*.node' -mmin +60 -delete 2>/dev/null || true

  unit-tests:
    needs: [fingerprint, prebuild-mix]
    # Skip on cross-repo plugin dispatch — plugin can't regress backend ExUnit.
    # Also skip when fingerprint already proved green for this content.
    if: github.event_name != 'repository_dispatch' && needs.fingerprint.outputs.backend-cache-hit != 'true'
    runs-on: [self-hosted, linux, x64, isolated]

    env:
      PG_CONTAINER: engram-unit-test-${{ github.run_id }}

    steps:
      - name: Reset sparse-checkout leaked from cross-repo jobs
        run: |
          # See comment in e2e-clerk's "Pre-cleanup stale resources" step.
          # `git sparse-checkout disable` does not clear stale skip-worktree
          # bits on the index, so we nuke .git on detected leak to force a
          # fresh clone via the next actions/checkout step.
          if [ -d .git ] && { [ -f .git/info/sparse-checkout ] || [ "$(git config --get core.sparseCheckout 2>/dev/null)" = "true" ]; }; then
            echo "::warning::Sparse-checkout leak detected — removing .git for fresh clone"
            rm -rf .git
          fi

      - uses: actions/checkout@v6
        with:
          clean: false  # Preserve _build/ and deps/ for incremental compilation

      - name: Start ephemeral postgres
        id: pg
        run: |
          # Clean up any leftover container from a previous cancelled run
          docker rm -f "$PG_CONTAINER" 2>/dev/null || true

          if [ -n "${LOCAL_REGISTRY:-}" ]; then
            PG_IMAGE="${LOCAL_REGISTRY}/postgres:16-alpine"
            docker pull "$PG_IMAGE" 2>/dev/null || PG_IMAGE="postgres:16-alpine"
          else
            PG_IMAGE="postgres:16-alpine"
          fi

          # `docker run -p 0:5432` races concurrent runners on the shared VM:
          # docker auto-allocates an ephemeral port, but between resolve and
          # bind another runner (or any process) can claim it. Retry the run
          # up to 5 times; each retry gets a fresh allocation.
          for attempt in 1 2 3 4 5; do
            if docker run -d --name "$PG_CONTAINER" \
                -e POSTGRES_USER=engram \
                -e POSTGRES_PASSWORD=engram \
                -e POSTGRES_DB=engram_test \
                -p 0:5432 \
                --health-cmd "pg_isready -U engram" \
                --health-interval 3s \
                --health-timeout 3s \
                --health-retries 10 \
                "$PG_IMAGE"; then
              break
            fi
            echo "Attempt $attempt: docker run failed (likely port race) — cleaning up + retrying"
            docker rm -f "$PG_CONTAINER" 2>/dev/null || true
            sleep 1
            if [ "$attempt" = "5" ]; then
              echo "::error::Postgres container failed to start after 5 attempts"
              exit 1
            fi
          done

          PG_PORT=$(docker port "$PG_CONTAINER" 5432/tcp | head -1 | cut -d: -f2)
          echo "pg_port=$PG_PORT" >> "$GITHUB_OUTPUT"
          echo "Postgres on port $PG_PORT (container: $PG_CONTAINER)"

      # Restore deps + _build/test compiled by `prebuild-mix`. Cache keys
      # are pinned via the prebuild-mix job's outputs, so this restore
      # matches exactly what was just compiled — `mix test` reuses the
      # BEAM files instead of recompiling.
      - name: Restore deps cache
        id: cache-deps
        uses: actions/cache/restore@v5
        with:
          path: deps
          key: ${{ needs.prebuild-mix.outputs.deps-key }}
          restore-keys: |
            mix-deps-${{ needs.prebuild-mix.outputs.beam-tag }}-

      - name: Restore _build/test cache
        uses: actions/cache/restore@v5
        with:
          path: _build/test
          key: ${{ needs.prebuild-mix.outputs.build-test-key }}
          restore-keys: |
            mix-build-test-${{ needs.prebuild-mix.outputs.beam-tag }}-

      - name: Fetch deps (if missing or lockfile changed)
        # Don't gate on `[ -d deps ]` — actions/cache's `restore-keys`
        # fallback can populate deps/ from a stale cache when the
        # exact-key match fails (any lockfile change). Use the cache
        # step's `cache-hit` output, which is 'true' only on exact
        # match; restore-keys partial hits leave it ''.
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: mix deps.get --only test

      - name: Run Elixir unit tests
        env:
          DATABASE_URL: postgresql://engram:engram@localhost:${{ steps.pg.outputs.pg_port }}/engram_test
        run: |
          for i in $(seq 1 30); do
            if docker exec "$PG_CONTAINER" pg_isready -U engram > /dev/null 2>&1; then
              echo "Test DB ready"
              break
            fi
            sleep 1
          done
          MIX_ENV=test mix ecto.create
          # Idempotent cluster bootstrap (engram_app role + DEFAULT
          # PRIVILEGES). Must run BEFORE migrate — baseline migration's
          # structure dump references engram_app in GRANT statements.
          # Mirrors prod entrypoint.sh ordering.
          MIX_ENV=test mix engram.prepare_database
          MIX_ENV=test mix ecto.migrate
          # Ensure Tailwind binary is valid (cache prune can corrupt native deps)
          mix tailwind.install 2>/dev/null || true
          # --warnings-as-errors treats compile-time warnings in test files
          # (unused aliases, unused vars, etc.) as fatal. Lib warnings are
          # already gated by `mix compile --warnings-as-errors` in the lint
          # job; this extends the same bar to test/**.
          mix test --warnings-as-errors

      - name: Lint DB schema (splinter)
        run: |
          # splinter (priv/repo/splinter.sql) references Supabase's API roles,
          # so stub them — without them the linter aborts on a plain Postgres.
          # Our tables aren't granted to these roles, so the API-exposure lints
          # (rls_disabled_in_public, *_table_exposed) stay silent; only genuine
          # schema/security findings surface. unused_index is filtered by the
          # gate (no scan stats on a fresh CI database).
          docker exec "$PG_CONTAINER" psql -U engram -d engram_test -q -v ON_ERROR_STOP=1 -c "
            DO \$\$ BEGIN CREATE ROLE anon NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END \$\$;
            DO \$\$ BEGIN CREATE ROLE authenticated NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END \$\$;
            DO \$\$ BEGIN CREATE ROLE service_role NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END \$\$;"
          docker exec -i "$PG_CONTAINER" psql -U engram -d engram_test -At -F'|' \
            < priv/repo/splinter.sql | bash priv/repo/lint_schema.sh

      - name: Lint new migrations (squawk)
        env:
          DATABASE_URL: postgresql://engram:engram@localhost:${{ steps.pg.outputs.pg_port }}/squawk_lint
          MIX_ENV: test
          BASE_REF: origin/main
        run: |
          # Need origin/main locally to detect which migrations are new.
          git fetch -q --depth=1 origin main || true
          # squawk (Rust, baseline x86-64), pinned.
          curl -fsSL -o /tmp/squawk \
            https://github.com/sbdchd/squawk/releases/download/v2.54.0/squawk-linux-x64
          chmod +x /tmp/squawk
          # Fresh DB to render the new migrations' DDL from scratch.
          docker exec "$PG_CONTAINER" createdb -U engram squawk_lint
          SQUAWK_BIN=/tmp/squawk bash priv/repo/lint_migrations.sh

      - name: Test new migrations roll back (ecto.rollback)
        env:
          DATABASE_URL: postgresql://engram:engram@localhost:${{ steps.pg.outputs.pg_port }}/rollback_test
          MIX_ENV: test
          BASE_REF: origin/main
        run: |
          git fetch -q --depth=1 origin main || true
          docker exec "$PG_CONTAINER" createdb -U engram rollback_test
          bash priv/repo/test_rollback.sh

      - name: Stop ephemeral postgres
        if: always()
        run: docker rm -fv "$PG_CONTAINER" 2>/dev/null || true

      - name: Clean temp files
        if: always()
        run: find /tmp -maxdepth 1 -name '.ff*.node' -mmin +60 -delete 2>/dev/null || true

  storage-database:
    needs: [fingerprint, prebuild-ci-image]
    # Minified self-host path (#297): boot the release with STORAGE_BACKEND=database
    # (Postgres bytea, no MinIO) and round-trip attachment bytes through the
    # storage adapter via `bin/engram rpc`. This is the only job that exercises
    # the no-MinIO boot path — the rest of CI runs STORAGE_BACKEND=s3. Skipped on
    # cross-repo plugin dispatch (can't regress backend) and when the backend
    # fingerprint already proved green.
    if: github.event_name != 'repository_dispatch' && needs.fingerprint.outputs.backend-cache-hit != 'true'
    runs-on: [self-hosted, linux, x64, isolated]

    env:
      CI_PROJECT: engram-ci-db-${{ github.run_id }}
      ENGRAM_CI_IMAGE: ${{ needs.prebuild-ci-image.outputs.image }}

    steps:
      - name: Reset sparse-checkout leaked from cross-repo jobs
        run: |
          if [ -d .git ] && { [ -f .git/info/sparse-checkout ] || [ "$(git config --get core.sparseCheckout 2>/dev/null)" = "true" ]; }; then
            echo "::warning::Sparse-checkout leak detected — removing .git for fresh clone"
            rm -rf .git
          fi

      - uses: actions/checkout@v6
        with:
          clean: false

      - name: Allocate dynamic ports
        id: ports
        run: |
          # Host-port publish is parallel-unsafe on the shared runner VM; pick
          # free ports per run. (The round-trip uses `compose exec`, not the
          # host port, but the compose file still publishes one.)
          get_free_port() { python3 -c "import socket; s=socket.socket(); s.bind(('',0)); print(s.getsockname()[1]); s.close()"; }
          echo "engram_port=$(get_free_port)" >> "$GITHUB_OUTPUT"
          echo "pg_port=$(get_free_port)" >> "$GITHUB_OUTPUT"

      - name: Boot minified stack (bytea storage, no MinIO)
        env:
          CI_ENGRAM_PORT: ${{ steps.ports.outputs.engram_port }}
          CI_PG_PORT: ${{ steps.ports.outputs.pg_port }}
        run: |
          docker compose -f docker-compose.ci-database.yml -p "$CI_PROJECT" down -v --remove-orphans 2>/dev/null || true
          # --no-build: reuse the image the prebuild-ci-image job already built.
          docker compose -f docker-compose.ci-database.yml -p "$CI_PROJECT" up -d --no-build --wait

      - name: Round-trip attachment bytes through Postgres
        run: |
          # rpc runs on the booted node, so it proves runtime.exs selected the
          # Database adapter AND the on-boot migration created storage_objects.
          # Any failed match raises; the sentinel grep is the authoritative gate.
          OUT=$(docker compose -f docker-compose.ci-database.yml -p "$CI_PROJECT" exec -T engram \
            /app/bin/engram rpc '
              key = "999/1/ci-smoke.bin"
              data = :crypto.strong_rand_bytes(64)
              Engram.Storage.Database = Engram.Storage.adapter()
              :ok = Engram.Storage.adapter().put(key, data)
              {:ok, ^data} = Engram.Storage.adapter().get(key)
              true = Engram.Storage.adapter().exists?(key)
              {:ok, 1} = Engram.Storage.adapter().delete_prefix("999/")
              {:error, :not_found} = Engram.Storage.adapter().get(key)
              IO.puts("STORAGE_DATABASE_ROUNDTRIP_OK")
            ')
          echo "$OUT"
          echo "$OUT" | grep -q STORAGE_DATABASE_ROUNDTRIP_OK

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci-database.yml -p "$CI_PROJECT" logs || true

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.ci-database.yml -p "$CI_PROJECT" down -v --remove-orphans --rmi local 2>/dev/null || true
          docker image prune -f 2>/dev/null || true
          docker volume prune -f 2>/dev/null || true

  lint:
    needs: [fingerprint, prebuild-mix]
    # Skip on cross-repo plugin dispatch — plugin can't regress backend lints.
    # Also skip when fingerprint already proved green.
    if: github.event_name != 'repository_dispatch' && needs.fingerprint.outputs.backend-cache-hit != 'true'
    runs-on: [self-hosted, linux, x64, isolated]

    steps:
      - name: Reset sparse-checkout leaked from cross-repo jobs
        run: |
          if [ -d .git ] && { [ -f .git/info/sparse-checkout ] || [ "$(git config --get core.sparseCheckout 2>/dev/null)" = "true" ]; }; then
            echo "::warning::Sparse-checkout leak detected — removing .git for fresh clone"
            rm -rf .git
          fi

      - uses: actions/checkout@v6
        with:
          clean: false  # Preserve _build/ and deps/ for incremental compilation

      # Restore prebuild-mix caches. deps + _build/dev populate ahead of
      # any mix command, so the redundant compile + deps.get is skipped
      # below. The Compile step then becomes a fast --warnings-as-errors
      # re-validation (no --force; cache was built warnings-clean).
      - name: Restore deps cache
        id: cache-deps
        uses: actions/cache/restore@v5
        with:
          path: deps
          key: ${{ needs.prebuild-mix.outputs.deps-key }}
          restore-keys: |
            mix-deps-${{ needs.prebuild-mix.outputs.beam-tag }}-

      - name: Restore _build/dev cache
        uses: actions/cache/restore@v5
        with:
          path: _build/dev
          key: ${{ needs.prebuild-mix.outputs.build-dev-key }}
          restore-keys: |
            mix-build-dev-${{ needs.prebuild-mix.outputs.beam-tag }}-

      - name: Fetch deps (if missing or lockfile changed)
        # Don't gate on `[ -d deps ]` — actions/cache's `restore-keys`
        # fallback can populate deps/ from a stale cache when the
        # exact-key match fails (any lockfile change). Use the cache
        # step's `cache-hit` output, which is 'true' only on exact
        # match; restore-keys partial hits leave it ''.
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: mix deps.get

      - name: Cache Dialyzer PLT
        uses: actions/cache@v5
        with:
          path: priv/plts
          key: ${{ runner.os }}-dialyzer-${{ needs.prebuild-mix.outputs.beam-tag }}-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-dialyzer-${{ needs.prebuild-mix.outputs.beam-tag }}-

      # ── Quality gates ──
      # Phase 1: all checks informational (continue-on-error: true).
      # Phase 2: format + warnings-as-errors → fatal.
      # Phase 3: sobelow → fatal.
      # Phase 4: dialyzer → fatal.
      # Phase 5: credo → fatal.
      # Phase 6: sobelow drops `--skip` (any `#sobelow_skip` annotation in the
      #         tree now surfaces as a finding); sobelow threshold already at
      #         strictest (low). Dialyzer flags already exceed plan target
      #         (Phase 4 added :missing_return + :extra_return on top of
      #         :unmatched_returns, :error_handling, :underspecs). Credo
      #         already strict (config + CLI). Deferred: Readability.Specs
      #         (~225 public funs need real type info — separate ratchet PR)
      #         and Design.DuplicatedCode (~13 findings, mostly Phoenix
      #         controller setup repeats — high noise at default mass=40).

      - name: Format check
        run: mix format --check-formatted

      - name: Compile warnings-as-errors
        # No --force: _build/dev was restored from prebuild-mix which
        # already compiled with --warnings-as-errors. This re-runs as a
        # safety net (incremental no-op when nothing changed).
        run: mix compile --warnings-as-errors

      - name: Credo (strict)
        run: mix credo --strict

      - name: Limit-keys lint
        run: mix engram.lint.limit_keys

      - name: No-client-only-rate-limits lint
        run: mix engram.lint.no_client_only_rate_limits

      - name: Sobelow
        run: mix sobelow --exit low

      - name: Hex CVE audit (mix_audit)
        # Backstops gaps in GitHub's Advisory DB coverage of Hex.
        # Dependabot only surfaces what's in the Advisory DB; mix_audit
        # also scans the upstream mirror-of-advisories list, catching
        # disclosed Hex CVEs before they propagate to GitHub.
        #
        # Severity policy:
        #   - high / critical  → ::error::, FAILS the build (blocks merge)
        #   - low / moderate   → ::warning::, surfaces as a PR annotation
        #     but does NOT block (so smaller findings don't sit silently
        #     in the JSON output we never read).
        #
        # Ignored advisories (re-evaluate on each dep bump):
        #   - GHSA-rhv4-8758-jx7v (decimal): fixed in 3.0.0; breaking
        #     major bump deferred to the next planned dep-bump pass.
        #   - GHSA-g2wm-735q-3f56 (cowlib): no patched version from
        #     upstream as of 2026-05-22; cookie-request-header injection.
        run: |
          # Write to a file rather than capturing via $() so we can show
          # both stdout and stderr if mix_audit produces something
          # unexpected. The empty-stdout failure mode was previously
          # invisible because $(...) swallowed everything.
          set +e
          mix deps.audit \
            --format=json \
            --ignore-advisory-ids GHSA-rhv4-8758-jx7v,GHSA-g2wm-735q-3f56 \
            > /tmp/audit.json 2> /tmp/audit.err
          MIX_EXIT=$?
          set -e

          echo "mix exit code: $MIX_EXIT"
          echo "stdout bytes: $(wc -c < /tmp/audit.json)"
          if [ -s /tmp/audit.err ]; then
            echo "--- stderr ---"
            cat /tmp/audit.err
            echo "--- end stderr ---"
          fi

          if [ ! -s /tmp/audit.json ]; then
            echo "::error::mix deps.audit produced no stdout (exit=$MIX_EXIT) — see stderr above"
            exit 2
          fi

          python3 <<'PY'
          import json, sys

          with open("/tmp/audit.json") as f:
              data = json.load(f)
          vulns = data.get("vulnerabilities", [])

          blocking = 0
          for v in vulns:
              sev = v["advisory"].get("severity", "unknown")
              pkg = v["dependency"]["package"]
              ver = v["dependency"]["version"]
              adv_id = v["advisory"]["id"]
              title = v["advisory"].get("title", "")
              level = "error" if sev in ("high", "critical") else "warning"
              if level == "error":
                  blocking += 1
              print(f"::{level} title=Hex CVE ({sev}): {pkg} {ver}::{adv_id} — {title}")

          if blocking:
              print(f"::error::{blocking} high+ severity Hex CVE(s) — bump the affected dep(s) to patch.")
              sys.exit(1)

          if vulns:
              print(f"Hex audit: {len(vulns)} non-blocking finding(s) (low/moderate). See annotations.")
          else:
              print("Hex audit: clean.")
          PY

      - name: Dialyzer
        run: |
          mkdir -p priv/plts
          mix dialyzer --quiet

  # ── Hygiene checks (folded from lint.yml + frontend-audit.yml) ──
  # Run on every trigger except cross-repo plugin dispatch (plugin
  # can't regress backend hygiene). NOT gated on backend-cache-hit
  # because root CLAUDE.md / TODO.md / repo-root markdown live
  # outside the BACKEND_HASH input set — gating on cache-hit would
  # let drift slip through on pure-doc pushes.
  #
  # These jobs are intentionally NOT added to the `ci` aggregator's
  # `needs:` — preserves their pre-fold "informational, not required"
  # protection-rule semantic. Promote to required by adding to the
  # aggregator + updating ruleset 16309248.

  todo-drift:
    name: TODO drift
    if: github.event_name != 'repository_dispatch'
    runs-on: [self-hosted, linux, x64, isolated]
    steps:
      - uses: actions/checkout@v6

      - name: Forbid TODO*.md files
        run: |
          set -euo pipefail
          # TODOs belong in GitHub Issues, not markdown checklists.
          # Audit context: 2026-05-22 doc-audit migrated 34 TODOs out of MD scrum-style.
          # See [[project_doc_audit_migration]] memory + project_workspace_maturity_wave.
          matches=$(find . -type f \( -name 'TODO.md' -o -name 'TODO-*.md' \) -not -path './.git/*' || true)
          if [ -n "$matches" ]; then
            echo "::error::Found TODO*.md files. File TODOs as GitHub Issues instead:"
            echo "$matches"
            exit 1
          fi
          echo "OK — no TODO*.md files."

      - name: Forbid checkbox-as-TODO in repo-root markdown
        run: |
          set -euo pipefail
          # Block `^- [ ]` and `^- [x]` checkbox patterns in repo-root markdown
          # (CLAUDE.md, README.md, etc.). Legitimate checklist locations
          # (runbooks under docs/context/, plans+specs under docs/superpowers/)
          # are intentionally not linted — they use checkboxes as a format.
          mapfile -t files < <(find . -maxdepth 1 -name '*.md' -type f)
          if [ ${#files[@]} -eq 0 ]; then
            echo "OK — no root markdown files to check."
            exit 0
          fi
          violations=$(grep -lE '^- \[[ x]\]' "${files[@]}" 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "::error::Found checkbox-as-TODO patterns in root markdown. File issues or move to a runbook/plan instead:"
            echo "$violations"
            grep -nE '^- \[[ x]\]' $violations || true
            exit 1
          fi
          echo "OK — no checkbox-as-TODO in root markdown."

  claude-md-staleness:
    name: CLAUDE.md staleness
    if: github.event_name != 'repository_dispatch'
    runs-on: [self-hosted, linux, x64, isolated]
    steps:
      - uses: actions/checkout@v6

      - name: Scan CLAUDE.md files for known-stale facts
        run: |
          set -euo pipefail
          # CLAUDE.md should reflect CURRENT product state. Patterns below are
          # known-dead facts per workspace memory entries:
          #   - dead domains  → [[project_domain]]
          #   - dead pricing  → [[project_pricing_model]] (v2 reanchored $10/$20)
          #   - dead org refs → [[project_engram_app_org_complete]]
          # Stripe references are intentionally NOT linted — too noisy
          # against legitimate "Stripe removed" historical context.
          mapfile -t files < <(find . -name 'CLAUDE.md' -type f -not -path './.git/*')
          if [ ${#files[@]} -eq 0 ]; then
            echo "OK — no CLAUDE.md files in repo."
            exit 0
          fi
          echo "Scanning: ${files[*]}"

          patterns=(
            'engram-sync\.app'
            'engram\.ras\.band'
            '\bengram\.com\b'
            'Starter[^\n]{0,30}\$5\b'
            'Pro[^\n]{0,30}\$10\b'
            'Starter[^\n]{0,30}\$6\b'
            'Pro[^\n]{0,30}\$12\b'
            'Rasbandit/[Ee]ngram'
          )

          fail=0
          for p in "${patterns[@]}"; do
            hits=$(grep -nPH "$p" "${files[@]}" 2>/dev/null || true)
            if [ -n "$hits" ]; then
              echo "::error::Stale pattern '${p}' found in CLAUDE.md:"
              echo "$hits"
              fail=1
            fi
          done
          if [ $fail -eq 1 ]; then
            echo
            echo "Replace with current state per workspace memory:"
            echo "  - Domains: app.engram.page (saas), engram.ax (selfhost)"
            echo "  - Pricing: Free / Starter \$10 / Pro \$20 (v2 reanchored)"
            echo "  - Org:     engram-app/<repo>"
            exit 1
          fi
          echo "OK — no known-stale facts in CLAUDE.md files."

  migrations-immutable:
    name: migrations immutable
    if: github.event_name != 'repository_dispatch'
    runs-on: [self-hosted, linux, x64, isolated]
    # Block in-place edits to already-applied migrations. Triggering incident:
    # 2026-05-30 PR #368 edited migration 20260530000002 in place from :inet
    # to :text after FastRaid prod had already run the :inet version, leaving
    # prod's oauth_clients.first_ip column as inet while CI's fresh DB
    # provisioned text — DCR endpoint crashed with Postgrex.EncodeError on
    # every register. Spec: workspace docs/superpowers/specs/2026-05-30-deploy-guardrails-design.md
    steps:
      - uses: actions/checkout@v6
        with:
          # Need history to diff against origin/main. depth=50 is plenty for
          # PR-sized diffs and avoids the full clone cost.
          fetch-depth: 50

      - name: Check migrations are not modified in place
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail

          # Genuine emergency bypass: PR carries the 'allow-migration-edit' label.
          # Use only when fixing a migration that has NOT reached any deployed
          # environment (rare; deliberately friction-y).
          if echo "$PR_LABELS" | grep -q '"allow-migration-edit"'; then
            echo "::notice::Bypass label 'allow-migration-edit' present — skipping immutable-migrations check."
            exit 0
          fi

          # verify.yml fires on `push`, not `pull_request`, so the label check
          # above is dead on most runs (github.event.pull_request is null).
          # Fallback bypass via [allow-migration-edit] tag in the head
          # commit message — same friction-y semantic, push-compatible.
          if git log -1 --format=%B | grep -qF '[allow-migration-edit]'; then
            echo "::notice::Bypass tag '[allow-migration-edit]' in HEAD commit message — skipping immutable-migrations check."
            exit 0
          fi

          # ci.yml fires on `push` to feature branches and main, not on
          # `pull_request`. The base ref to diff against is origin/main for
          # any non-main branch; on main itself there's nothing to compare.
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "On main — nothing to check."
            exit 0
          fi

          BASE_REF="main"
          # Fail loud on fetch errors — silencing stderr would let a transient
          # network failure produce a false-negative green run.
          if ! git fetch origin "${BASE_REF}" --depth=50 >/dev/null; then
            echo "::error::Failed to fetch base ref origin/${BASE_REF}"
            exit 1
          fi

          failed=0
          # --diff-filter=MTD catches modifications, type changes, and deletions.
          # --no-renames disables git's default rename detection so a `git mv` of
          # an already-applied migration decomposes into add+delete; the delete
          # half then matches the filter and gets flagged. Without --no-renames,
          # renames surface as status R and slip the check silently.
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if git cat-file -e "origin/${BASE_REF}:$file" 2>/dev/null; then
              echo "::error file=$file::Migration was modified in place. Applied migrations are immutable — write a NEW migration to amend the schema. (Bypass with PR label 'allow-migration-edit'.)"
              failed=1
            fi
          done < <(git diff --name-only --no-renames --diff-filter=MTD "origin/${BASE_REF}...HEAD" -- 'priv/repo/migrations/*.exs')

          if [ "$failed" -eq 0 ]; then
            echo "OK — no applied migrations modified in place."
          fi
          exit $failed

  phase-label-required:
    # A migration PR must declare its expand/contract phase via a label.
    # This is what enforces the two-deploy fence (expand in release N,
    # contract in release N+1, never both in the same image). Self-hosters
    # do not see the label; it's a CI-time check only.
    #
    # Labels (exactly one required):
    #   phase/expand        - additive, forward-compatible with current main
    #   phase/migrate-data  - backfills, dual-writes, read switches
    #   phase/contract      - drops old columns/tables (gated by
    #                         contract-phase-references job)
    #   phase/single-shot   - expand+contract in one release; accept downtime
    #                         even on SaaS. Use sparingly.
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: [self-hosted, linux, x64, isolated]
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect migration touches
        id: detect
        run: |
          git fetch -q --depth=1 origin main || true
          changed=$(git diff --name-only --diff-filter=ACMR \
            origin/main...HEAD -- 'priv/repo/migrations/*.exs' || true)
          if [ -z "$changed" ]; then
            echo "touches=false" >> "$GITHUB_OUTPUT"
            echo "No migration changes on this branch — phase label not required."
          else
            echo "touches=true" >> "$GITHUB_OUTPUT"
            echo "Migrations changed on this branch:"
            printf '  %s\n' $changed
          fi

      - name: Require exactly one phase/* label
        if: steps.detect.outputs.touches == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          pr_number=$(gh pr list --head "${GITHUB_REF_NAME}" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$pr_number" ]; then
            echo "::error::Migration changes pushed but no open PR found for branch ${GITHUB_REF_NAME}."
            echo "::error::Open a PR with the appropriate phase/* label (expand, migrate-data, contract, single-shot)"
            echo "::error::before pushing migration changes. See AGENTS.md § Migration phases — the rule."
            exit 1
          fi
          phase_labels=$(gh api "repos/$REPO/issues/$pr_number/labels" \
            --jq '.[].name | select(startswith("phase/"))')
          count=$(printf '%s\n' "$phase_labels" | grep -c . || true)
          if [ "$count" -ne 1 ]; then
            echo "::error::Migration PR must carry exactly ONE phase/* label."
            echo "::error::Found $count phase/* labels on PR #$pr_number."
            echo "::error::Valid labels: phase/expand, phase/migrate-data, phase/contract, phase/single-shot"
            echo "::error::See AGENTS.md § Migration phases — the rule for guidance."
            exit 1
          fi
          echo "OK — PR #$pr_number carries phase label: $phase_labels"

  contract-phase-references:
    # On phase/contract PRs only: extract the columns and tables dropped
    # by each new migration and verify NO lib/ code still references them.
    # Enforces the expand/contract two-deploy fence: code that uses a
    # column must be removed in an earlier release before the column itself
    # is dropped in a later release.
    if: |
      github.event_name == 'push' &&
      github.ref != 'refs/heads/main' &&
      needs.fingerprint.outputs.backend-cache-hit != 'true'
    runs-on: [self-hosted, linux, x64, isolated]
    needs: [fingerprint, phase-label-required, prebuild-mix]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check phase/contract label on open PR
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          pr_number=$(gh pr list --head "${GITHUB_REF_NAME}" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$pr_number" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "No open PR for branch ${GITHUB_REF_NAME} — skipping contract-phase-references."
            exit 0
          fi
          labels=$(gh api "repos/$REPO/issues/$pr_number/labels" --jq '.[].name')
          if echo "$labels" | grep -qx 'phase/contract'; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
            echo "phase/contract label present on PR #$pr_number — running grep gate."
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "phase/contract label NOT present — skipping grep gate."
          fi

      # Restore prebuild-mix caches. Same pattern as the `lint` job: deps +
      # _build/dev populated before any mix command so compile is a fast
      # incremental no-op. Keys are pinned to the BEAM version emitted by
      # prebuild-mix so a runner OTP/Elixir bump correctly invalidates the
      # cache instead of feeding stale BEAM artifacts.
      - name: Restore deps cache
        if: steps.gate.outputs.proceed == 'true'
        id: cache-deps
        uses: actions/cache/restore@v5
        with:
          path: deps
          key: ${{ needs.prebuild-mix.outputs.deps-key }}
          restore-keys: |
            mix-deps-${{ needs.prebuild-mix.outputs.beam-tag }}-

      - name: Restore _build/dev cache
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/cache/restore@v5
        with:
          path: _build/dev
          key: ${{ needs.prebuild-mix.outputs.build-dev-key }}
          restore-keys: |
            mix-build-dev-${{ needs.prebuild-mix.outputs.beam-tag }}-

      - name: Install deps
        if: steps.gate.outputs.proceed == 'true' && steps.cache-deps.outputs.cache-hit != 'true'
        run: mix deps.get --check-locked

      - name: Compile
        if: steps.gate.outputs.proceed == 'true'
        run: mix compile

      - name: List new migrations
        if: steps.gate.outputs.proceed == 'true'
        id: list
        run: |
          git fetch -q --depth=1 origin main || true
          BASE_REF="origin/main" \
            bash priv/repo/list_new_migrations.sh > /tmp/new-migrations.txt
          if [ ! -s /tmp/new-migrations.txt ]; then
            echo "::error::phase/contract label set but no migrations newer than base ref"
            exit 1
          fi
          echo "New migrations on this PR:"
          sed 's/^/  /' /tmp/new-migrations.txt

      - name: Extract dropped identifiers
        if: steps.gate.outputs.proceed == 'true'
        id: drops
        run: |
          : > /tmp/drops.txt
          while IFS= read -r f; do
            mix engram.migration_drops "priv/repo/migrations/$f" >> /tmp/drops.txt
          done < /tmp/new-migrations.txt
          if [ ! -s /tmp/drops.txt ]; then
            echo "::notice::phase/contract label set but no extractable drops found in new migrations."
            echo "::notice::Possible reasons:"
            echo "::notice::  - Every drop in this PR is bypassed via # safety_assured: (legitimate; auditor trusts justification)"
            echo "::notice::  - The PR was mis-labeled as phase/contract (recommend removing the label)"
            echo "::notice::Reviewer: confirm intent on this PR before merging."
            exit 0
          fi
          echo "Dropped identifiers this PR introduces:"
          sed 's/^/  /' /tmp/drops.txt

      - name: Grep lib/ for surviving references
        if: steps.gate.outputs.proceed == 'true'
        run: |
          # grep -E exit codes:
          #   0 = match found
          #   1 = no match (OK; gate passes for this identifier)
          #   2+ = error (regex syntax, I/O — must NOT be swallowed)
          # The old `|| true` collapsed all three into "no match", silently
          # masking regex-metachar bugs in identifier names.
          fail=0
          while IFS= read -r line; do
            # line is "column <table> <name>" or "table <name>"
            kind=$(echo "$line" | awk '{print $1}')
            case "$kind" in
              column) name=$(echo "$line" | awk '{print $3}') ;;
              table)  name=$(echo "$line" | awk '{print $2}') ;;
              *)      continue ;;
            esac

            # Escape ERE metacharacters in the identifier before interpolating.
            # An identifier like `count.x` would otherwise let `.` match any
            # char; `foo[bar` would crash grep with 'Unmatched ['.
            esc=$(printf '%s' "$name" | sed 's/[][\\.*+?(){}|^$]/\\&/g')

            # Match three Elixir reference forms:
            #   :name           — atom literal
            #   "name"          — string literal
            #   .name           — dot-access on a query binding (`u.field`)
            # The dot-access form is the most common Ecto.Query pattern;
            # without it, surviving `from u in User, where: u.legacy_flag`
            # references would slip past the gate.
            set +e
            hits=$(grep -RnE "(:${esc}\b|\"${esc}\"|\.${esc}\b)" lib/)
            grep_status=$?
            set -e
            if [ "$grep_status" -gt 1 ]; then
              fail=1
              echo "::error::grep failed (exit $grep_status) for identifier '$name' — likely a regex metachar slipped through escaping. Inspect priv/repo/migrations/ for unusual column or table names."
              continue
            fi

            if [ -n "$hits" ]; then
              fail=1
              echo "::error::lib/ still references dropped identifier '$name':"
              printf '%s\n' "$hits" | sed 's/^/  /'
            fi
          done < /tmp/drops.txt

          if [ "$fail" -eq 1 ]; then
            echo "::error::Contract-phase migration cannot land while lib/ still uses the dropped identifiers."
            echo "::error::Ship an expand+code-change PR first that stops using these names, then come back for the drop."
            echo "::error::See AGENTS.md § Expand/contract — the workflow for guidance."
            exit 1
          fi
          echo "OK — no surviving lib/ references to dropped identifiers."

  n1-compat:
    # On phase/expand PRs only: prove the new migrations cleanly apply on
    # top of the previous release-v* tag's schema. This catches malformed
    # expand-phase migrations (NOT NULL without default, incompatible
    # type changes, etc.) that Squawk's per-statement scan can miss in
    # the catalog-level view.
    #
    # Simpler than the original plan: applies migrations, doesn't run
    # the prev release's full mix test (brittle across versions). The
    # "migrate applies cleanly" check is the load-bearing invariant.
    if: |
      github.event_name == 'push' &&
      github.ref != 'refs/heads/main' &&
      needs.fingerprint.outputs.backend-cache-hit != 'true'
    runs-on: [self-hosted, linux, x64, isolated]
    needs: [fingerprint, prebuild-mix]
    permissions:
      contents: read
    env:
      PG_CONTAINER: engram-n1-compat-${{ github.run_id }}
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check phase/expand label on open PR
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          pr_number=$(gh pr list --head "${GITHUB_REF_NAME}" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$pr_number" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "No open PR for branch ${GITHUB_REF_NAME} — skipping n1-compat."
            exit 0
          fi
          labels=$(gh api "repos/$REPO/issues/$pr_number/labels" --jq '.[].name')
          if echo "$labels" | grep -qx 'phase/expand'; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "phase/expand label present on PR #$pr_number — running N-1 compat."
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "phase/expand label NOT present — skipping N-1 compat."
          fi

      - name: Resolve previous release tag
        if: steps.gate.outputs.proceed == 'true'
        id: prev
        run: |
          # Most-recent release-v* tag in the repo, excluding any tag that
          # would point at HEAD (defensive — shouldn't happen on a feature
          # branch but cheap to guard).
          prev=$(git tag -l 'release-v*' --sort=-v:refname | head -1)
          if [ -z "$prev" ]; then
            echo "::warning::No release-v* tag found — N-1 compat cannot run on a never-released branch."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=$prev" >> "$GITHUB_OUTPUT"
          echo "proceed=true" >> "$GITHUB_OUTPUT"
          echo "Previous release: $prev"

      - name: Check out previous release in a sibling worktree
        if: steps.gate.outputs.proceed == 'true' && steps.prev.outputs.proceed == 'true'
        run: |
          # Clean any stale worktree from a previous run on this runner.
          rm -rf /tmp/prev-release
          git worktree prune
          git worktree add /tmp/prev-release "${{ steps.prev.outputs.tag }}"

      - name: Start ephemeral postgres
        if: steps.gate.outputs.proceed == 'true' && steps.prev.outputs.proceed == 'true'
        id: pg
        run: |
          docker rm -f "$PG_CONTAINER" 2>/dev/null || true
          docker run -d --name "$PG_CONTAINER" \
            -e POSTGRES_USER=engram \
            -e POSTGRES_PASSWORD=engram \
            -e POSTGRES_DB=engram_n1 \
            -P \
            postgres:16-alpine
          # Wait for ready
          for i in $(seq 1 30); do
            if docker exec "$PG_CONTAINER" pg_isready -U engram >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          PG_PORT=$(docker port "$PG_CONTAINER" 5432/tcp | head -1 | cut -d: -f2)
          echo "pg_port=$PG_PORT" >> "$GITHUB_OUTPUT"
          echo "Postgres on port $PG_PORT (container: $PG_CONTAINER)"

      - uses: actions/cache/restore@v5
        if: steps.gate.outputs.proceed == 'true' && steps.prev.outputs.proceed == 'true'
        id: cache-deps
        with:
          path: /tmp/prev-release/deps
          key: ${{ needs.prebuild-mix.outputs.deps-key }}
          restore-keys: mix-deps-${{ needs.prebuild-mix.outputs.beam-tag }}-

      - name: Install deps for prev release
        if: steps.gate.outputs.proceed == 'true' && steps.prev.outputs.proceed == 'true' && steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: /tmp/prev-release
        run: mix deps.get

      - name: Compile prev release
        if: steps.gate.outputs.proceed == 'true' && steps.prev.outputs.proceed == 'true'
        working-directory: /tmp/prev-release
        run: mix compile

      - name: Set up DB at prev release schema
        if: steps.gate.outputs.proceed == 'true' && steps.prev.outputs.proceed == 'true'
        working-directory: /tmp/prev-release
        env:
          DATABASE_URL: postgresql://engram:engram@localhost:${{ steps.pg.outputs.pg_port }}/engram_n1
        run: |
          mix ecto.create
          mix ecto.migrate
          echo "DB now at prev release schema."

      - name: Apply this branch's new migrations on top of prev's schema
        if: steps.gate.outputs.proceed == 'true' && steps.prev.outputs.proceed == 'true'
        env:
          DATABASE_URL: postgresql://engram:engram@localhost:${{ steps.pg.outputs.pg_port }}/engram_n1
        working-directory: /tmp/prev-release
        run: |
          # Copy this branch's NEW migrations into prev's migrations dir.
          cd "${{ github.workspace }}"
          git fetch -q --depth=1 origin main || true
          if ! new_files_output=$(bash priv/repo/list_new_migrations.sh); then
            echo "::error::n1-compat: list_new_migrations.sh failed (BASE_REF may not be fetched)"
            exit 1
          fi
          if [ -z "$new_files_output" ]; then
            echo "::notice::n1-compat: no new migrations on this branch — nothing to apply on top of prev."
            exit 0
          fi
          echo "New migrations on this PR (about to apply on top of prev's schema):"
          echo "$new_files_output" | sed 's/^/  /'
          while IFS= read -r f; do
            cp "priv/repo/migrations/$f" /tmp/prev-release/priv/repo/migrations/
          done <<<"$new_files_output"

          # Now migrate prev with the new files in its tree. If this
          # fails, the expand-phase migration is incompatible with the
          # previously-deployed schema.
          cd /tmp/prev-release
          mix ecto.migrate

      - name: Smoke-query the migrated DB
        if: steps.gate.outputs.proceed == 'true' && steps.prev.outputs.proceed == 'true'
        env:
          DATABASE_URL: postgresql://engram:engram@localhost:${{ steps.pg.outputs.pg_port }}/engram_n1
        run: |
          # Quick sanity check that the migrated DB is queryable. We're
          # not running the test suite (brittle cross-version), just
          # confirming basic structure.
          docker exec "$PG_CONTAINER" psql -U engram -d engram_n1 -At -c "SELECT 1" >/dev/null
          table_count=$(docker exec "$PG_CONTAINER" psql -U engram -d engram_n1 -At -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public'")
          echo "OK — migrated DB has $table_count public tables."

      - name: Stop ephemeral postgres
        if: always() && steps.gate.outputs.proceed == 'true' && steps.prev.outputs.proceed == 'true'
        run: docker rm -fv "$PG_CONTAINER" 2>/dev/null || true

      - name: Clean up prev-release worktree
        if: always() && steps.gate.outputs.proceed == 'true' && steps.prev.outputs.proceed == 'true'
        run: |
          rm -rf /tmp/prev-release
          git worktree prune

  frontend-audit:
    name: frontend audit
    if: github.event_name != 'repository_dispatch'
    runs-on: [self-hosted, linux, x64, isolated]
    # Run `bun audit` against frontend/ on every CI trigger. Fail when any
    # critical or high advisory affects a PRODUCTION dependency path. The
    # --prod flag scopes to non-dev paths so a vuln deep under, say,
    # pngquant-bin (build-time image tool) doesn't block PRs.
    #
    # Note: `bun audit --prod` (as of bun 1.3.11) still prints the full
    # advisory header — including some parent paths that aren't production —
    # because it groups by advisory rather than by resolved path. The jq
    # filter below relies on the `severity` field, not the path list, so
    # false-positive parents in the printout don't affect the gate.
    #
    # Path filter (from pre-fold frontend-audit.yml) is preserved via the
    # guard step below: skip when neither frontend/package.json nor
    # frontend/bun.lock changed vs origin/main. On main itself, run
    # unconditionally (audits the just-merged state).
    steps:
      - uses: actions/checkout@v6
        with:
          # Need history to diff against origin/main in the guard step.
          fetch-depth: 50

      - name: Path-filter early-exit
        id: guard
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "On main — running audit unconditionally."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Ensure base ref is available for the diff. Tolerate failure —
          # if fetch fails, the diff will surface the error explicitly.
          git fetch origin main --depth=50 >/dev/null 2>&1 || true
          if git diff --quiet origin/main HEAD -- \
                frontend/package.json frontend/bun.lock 2>/dev/null; then
            echo "Skipped — no changes to frontend/package.json or frontend/bun.lock vs main."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Lockfile changed — running audit."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.guard.outputs.skip != 'true'
        with:
          bun-version: latest

      - name: bun audit --prod
        if: steps.guard.outputs.skip != 'true'
        working-directory: frontend
        run: |
          set -uo pipefail
          json=$(bun audit --prod --json 2>/dev/null || echo '{}')
          echo "$json" | jq .

          # Gate: any advisory with severity critical or high in --prod scope.
          blocking=$(echo "$json" | jq '[
            (.advisories // .vulnerabilities // [] | .. | objects | select(.severity?))
            | select(.severity == "critical" or .severity == "high")
          ] | length')

          if [ "$blocking" -gt 0 ]; then
            echo "::error::Found $blocking critical/high advisory in production deps."
            echo "Run \`bun audit --prod\` locally for the full report."
            exit 1
          fi

          echo "Prod audit clean (critical/high)."

  e2e-local:
    needs: [fingerprint, prebuild-ci-image]
    # Skip on cross-repo plugin dispatch — plugin uses Clerk JWTs in production,
    # so the local-auth API path is backend-internal.
    # Also skip when fingerprint already proved green, or when running on a
    # Dependabot PR (Phoenix webServer boot needs secrets Dependabot can't
    # access; unit-tests + lint cover the meaningful surface).
    if: github.event_name != 'repository_dispatch' && needs.fingerprint.outputs.backend-cache-hit != 'true' && github.actor != 'dependabot[bot]'
    runs-on: [self-hosted, linux, x64, isolated]

    env:
      CI_PROJECT: engram-ci-local-${{ github.run_id }}
      QDRANT_COLLECTION: ci_local_${{ github.run_id }}
      ENGRAM_CI_IMAGE: ${{ needs.prebuild-ci-image.outputs.image }}

    steps:
      - name: Reset sparse-checkout leaked from cross-repo jobs
        run: |
          # See comment in e2e-clerk's "Pre-cleanup stale resources" step.
          # `git sparse-checkout disable` does not clear stale skip-worktree
          # bits on the index, so we nuke .git on detected leak to force a
          # fresh clone via the next actions/checkout step.
          if [ -d .git ] && { [ -f .git/info/sparse-checkout ] || [ "$(git config --get core.sparseCheckout 2>/dev/null)" = "true" ]; }; then
            echo "::warning::Sparse-checkout leak detected — removing .git for fresh clone"
            rm -rf .git
          fi

      - uses: actions/checkout@v6
        with:
          clean: false

      - name: Allocate dynamic ports
        id: ports
        run: |
          get_free_port() {
            python3 -c "import socket; s=socket.socket(); s.bind(('',0)); print(s.getsockname()[1]); s.close()"
          }
          ENGRAM_PORT=$(get_free_port)
          PG_PORT=$(get_free_port)
          for var in ENGRAM_PORT PG_PORT; do
            if [ -z "${!var}" ]; then
              echo "::error::Port allocation failed for $var"
              exit 1
            fi
          done
          echo "engram_port=$ENGRAM_PORT" >> "$GITHUB_OUTPUT"
          echo "pg_port=$PG_PORT" >> "$GITHUB_OUTPUT"
          echo "Ports: engram=$ENGRAM_PORT pg=$PG_PORT"

      - name: Start CI stack (local auth)
        env:
          CI_ENGRAM_PORT: ${{ steps.ports.outputs.engram_port }}
          CI_PG_PORT: ${{ steps.ports.outputs.pg_port }}
          QDRANT_COLLECTION: ${{ env.QDRANT_COLLECTION }}
        run: |
          docker compose -f docker-compose.ci.yml -f docker-compose.ci-local.yml \
            -p "$CI_PROJECT" down -v --remove-orphans 2>/dev/null || true

          # Clean up stale Qdrant collection
          curl -sf -X DELETE "http://10.0.20.201:6333/collections/${QDRANT_COLLECTION}" > /dev/null 2>&1 || true

          # Image was already built by `prebuild-ci-image`. ENGRAM_CI_IMAGE
          # pins docker-compose.ci.yml's `image:` to that tag and --no-build
          # fails loudly if missing instead of silently rebuilding.
          docker compose -f docker-compose.ci.yml -f docker-compose.ci-local.yml \
            -p "$CI_PROJECT" up -d --no-build --wait

          # Wait for health
          for i in $(seq 1 60); do
            if curl -sf "http://localhost:${CI_ENGRAM_PORT}/api/health" > /dev/null 2>&1; then
              echo "Local auth stack healthy on port ${CI_ENGRAM_PORT}"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Local auth stack failed to start"
          docker compose -f docker-compose.ci.yml -f docker-compose.ci-local.yml \
            -p "$CI_PROJECT" logs
          exit 1

      - name: Run local auth API tests
        working-directory: e2e
        env:
          ENGRAM_API_URL: http://localhost:${{ steps.ports.outputs.engram_port }}/api
          AUTH_PROVIDER: local
          CI_POSTGRES_CONTAINER: ${{ env.CI_PROJECT }}-postgres-1
          CI_MINIO_CONTAINER: ${{ env.CI_PROJECT }}-minio-1
          QDRANT_URL: http://10.0.20.201:6333
          QDRANT_COLLECTION: ${{ env.QDRANT_COLLECTION }}
          OLLAMA_URL: http://10.0.20.214:11434
        run: python3 -m pytest tests/api_only/ -v --timeout=180 -p no:cacheprovider --no-header

      - name: Collect failure logs
        if: failure()
        run: |
          mkdir -p ci-artifacts-local
          docker compose -f docker-compose.ci.yml -f docker-compose.ci-local.yml \
            -p "$CI_PROJECT" logs > ci-artifacts-local/docker-compose.log 2>&1

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-local-auth-debug-${{ github.sha }}
          path: ci-artifacts-local/
          retention-days: 7

      - name: Tear down
        if: always()
        run: |
          curl -sf -X DELETE "http://10.0.20.201:6333/collections/${QDRANT_COLLECTION}" > /dev/null 2>&1 || true
          docker compose -f docker-compose.ci.yml -f docker-compose.ci-local.yml \
            -p "$CI_PROJECT" down -v --remove-orphans --rmi local 2>/dev/null || true
          docker image prune -f 2>/dev/null || true
          rm -rf ci-artifacts-local/
          find /tmp -maxdepth 1 -name '.ff*.node' -mmin +60 -delete 2>/dev/null || true

  e2e-browser:
    needs: [fingerprint, prebuild-mix]
    # Skip on cross-repo plugin dispatch — Playwright targets backend's React
    # frontend, which the plugin (separate repo) cannot affect.
    # Also skip when fingerprint already proved green, or on Dependabot PRs
    # (Phoenix webServer needs Clerk secrets Dependabot can't access).
    if: github.event_name != 'repository_dispatch' && needs.fingerprint.outputs.backend-cache-hit != 'true' && github.actor != 'dependabot[bot]'
    runs-on: [self-hosted, linux, x64, isolated]

    env:
      PG_CONTAINER: engram-e2e-browser-${{ github.run_id }}

    steps:
      - name: Reset sparse-checkout leaked from cross-repo jobs
        run: |
          # See comment in e2e-clerk's "Pre-cleanup stale resources" step.
          # `git sparse-checkout disable` does not clear stale skip-worktree
          # bits on the index, so we nuke .git on detected leak to force a
          # fresh clone via the next actions/checkout step.
          if [ -d .git ] && { [ -f .git/info/sparse-checkout ] || [ "$(git config --get core.sparseCheckout 2>/dev/null)" = "true" ]; }; then
            echo "::warning::Sparse-checkout leak detected — removing .git for fresh clone"
            rm -rf .git
          fi

      - uses: actions/checkout@v6
        with:
          clean: false

      # Restore prebuild-mix caches so `mix phx.server` (spawned by
      # Playwright's webServer config) reuses compiled BEAM files
      # instead of recompiling at boot.
      - name: Restore deps cache
        id: cache-deps
        uses: actions/cache/restore@v5
        with:
          path: deps
          key: ${{ needs.prebuild-mix.outputs.deps-key }}
          restore-keys: |
            mix-deps-${{ needs.prebuild-mix.outputs.beam-tag }}-

      - name: Restore _build/dev cache
        uses: actions/cache/restore@v5
        with:
          path: _build/dev
          key: ${{ needs.prebuild-mix.outputs.build-dev-key }}
          restore-keys: |
            mix-build-dev-${{ needs.prebuild-mix.outputs.beam-tag }}-

      - name: Allocate dynamic ports
        id: ports
        run: |
          get_free_port() {
            python3 -c "import socket; s=socket.socket(); s.bind(('',0)); print(s.getsockname()[1]); s.close()"
          }
          PW_LOCAL_BACKEND_PORT=$(get_free_port)
          PW_LOCAL_VITE_PORT=$(get_free_port)
          PW_CLERK_BACKEND_PORT=$(get_free_port)
          PW_CLERK_VITE_PORT=$(get_free_port)

          for var in PW_LOCAL_BACKEND_PORT PW_LOCAL_VITE_PORT PW_CLERK_BACKEND_PORT PW_CLERK_VITE_PORT; do
            if [ -z "${!var}" ]; then
              echo "::error::Port allocation failed for $var"
              exit 1
            fi
          done

          echo "pw_local_backend_port=$PW_LOCAL_BACKEND_PORT" >> "$GITHUB_OUTPUT"
          echo "pw_local_vite_port=$PW_LOCAL_VITE_PORT" >> "$GITHUB_OUTPUT"
          echo "pw_clerk_backend_port=$PW_CLERK_BACKEND_PORT" >> "$GITHUB_OUTPUT"
          echo "pw_clerk_vite_port=$PW_CLERK_VITE_PORT" >> "$GITHUB_OUTPUT"
          echo "Ports: local=$PW_LOCAL_BACKEND_PORT/$PW_LOCAL_VITE_PORT clerk=$PW_CLERK_BACKEND_PORT/$PW_CLERK_VITE_PORT"

      - name: Start ephemeral postgres
        id: pg
        run: |
          docker rm -f "$PG_CONTAINER" 2>/dev/null || true
          if [ -n "${LOCAL_REGISTRY:-}" ]; then
            PG_IMAGE="${LOCAL_REGISTRY}/postgres:16-alpine"
            docker pull "$PG_IMAGE" 2>/dev/null || PG_IMAGE="postgres:16-alpine"
          else
            PG_IMAGE="postgres:16-alpine"
          fi
          # Retry on ephemeral-port race with sibling runners (see unit-tests).
          for attempt in 1 2 3 4 5; do
            if docker run -d --name "$PG_CONTAINER" \
                -e POSTGRES_USER=engram \
                -e POSTGRES_PASSWORD=engram \
                -e POSTGRES_DB=engram_dev \
                -p 0:5432 \
                --health-cmd "pg_isready -U engram" \
                --health-interval 3s \
                --health-timeout 3s \
                --health-retries 10 \
                "$PG_IMAGE"; then
              break
            fi
            echo "Attempt $attempt: docker run failed (likely port race) — cleaning up + retrying"
            docker rm -f "$PG_CONTAINER" 2>/dev/null || true
            sleep 1
            if [ "$attempt" = "5" ]; then
              echo "::error::Postgres container failed to start after 5 attempts"
              exit 1
            fi
          done
          PG_PORT=$(docker port "$PG_CONTAINER" 5432/tcp | head -1 | cut -d: -f2)
          echo "pg_port=$PG_PORT" >> "$GITHUB_OUTPUT"
          echo "Postgres on port $PG_PORT"

      - name: Fetch deps (if missing or lockfile changed)
        # Don't gate on `[ -d deps ]` — actions/cache's `restore-keys`
        # fallback can populate deps/ from a stale cache when the
        # exact-key match fails (any lockfile change). Use the cache
        # step's `cache-hit` output, which is 'true' only on exact
        # match; restore-keys partial hits leave it ''.
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: mix deps.get

      - name: Wait for DB + ecto setup + tailwind
        env:
          DATABASE_URL: postgresql://engram:engram@localhost:${{ steps.pg.outputs.pg_port }}/engram_dev
        run: |
          for i in $(seq 1 30); do
            if docker exec "$PG_CONTAINER" pg_isready -U engram > /dev/null 2>&1; then
              echo "DB ready"; break
            fi
            sleep 1
          done
          mix ecto.create
          # See unit-tests job comment — prepare_database must precede migrate.
          mix engram.prepare_database
          mix ecto.migrate
          # Ensure Tailwind binary is valid (cache prune can corrupt native deps).
          # Mirror of unit-tests fix — Playwright's webServer boots Phoenix
          # which boots Tailwind, and a corrupt :eacces binary kills the boot.
          mix tailwind.install 2>/dev/null || true

      - name: Install frontend deps + Playwright
        working-directory: frontend
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun install --frozen-lockfile --registry http://10.0.20.214:4873
          bunx playwright install chromium

      - name: Run Playwright tests
        working-directory: frontend
        env:
          DATABASE_URL: postgresql://engram:engram@localhost:${{ steps.pg.outputs.pg_port }}/engram_dev
          JWT_SECRET: test-e2e-browser-secret
          # Phoenix backend spawned by Playwright's webServer inherits this
          # env. Without an override, :rate_limit_auth defaults to 10 req/60s
          # and the local-auth + dark-mode + mobile suites collectively burst
          # past it on /api/auth/register → 429s. Matches the value already
          # set in docker-compose.ci-local.yml for the e2e-local job.
          RATE_LIMIT_AUTH_OVERRIDE: "1000"
          # Production self-host default is invite_only; pin "open" so the
          # Playwright fixtures (which register multiple users) don't 403 with
          # invite_required. Matches docker-compose.ci-local.yml for e2e-local.
          ENGRAM_DEFAULT_REGISTRATION_MODE: open
          PW_LOCAL_BACKEND_PORT: ${{ steps.ports.outputs.pw_local_backend_port }}
          PW_LOCAL_VITE_PORT: ${{ steps.ports.outputs.pw_local_vite_port }}
          PW_CLERK_BACKEND_PORT: ${{ steps.ports.outputs.pw_clerk_backend_port }}
          PW_CLERK_VITE_PORT: ${{ steps.ports.outputs.pw_clerk_vite_port }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          E2E_CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
          CLERK_JWKS_URL: ${{ secrets.CLERK_JWKS_URL }}
          CLERK_ISSUER: ${{ secrets.CLERK_ISSUER }}
          CI: "true"
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bunx playwright test

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts-${{ github.sha }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

      - name: Tear down
        if: always()
        run: |
          docker rm -fv "$PG_CONTAINER" 2>/dev/null || true
          find /tmp -maxdepth 1 -name '.ff*.node' -mmin +60 -delete 2>/dev/null || true

  ci:
    if: always() && (needs.fingerprint.outputs.backend-cache-hit != 'true' || needs.fingerprint.outputs.e2e-cache-hit != 'true')
    needs: [fingerprint, version-check, unit-tests, lint, storage-database, e2e-clerk, e2e-local, e2e-browser, n1-compat]
    runs-on: [self-hosted, linux, x64, isolated]
    steps:
      - name: Check required jobs
        run: |
          VC="${{ needs.version-check.result }}"
          UT="${{ needs.unit-tests.result }}"
          LN="${{ needs.lint.result }}"
          SD="${{ needs.storage-database.result }}"
          EC="${{ needs.e2e-clerk.result }}"
          EL="${{ needs.e2e-local.result }}"
          EB="${{ needs.e2e-browser.result }}"

          # version-check is skipped on main (only runs on branches) — that's expected.
          if [ "$VC" != "success" ] && [ "$VC" != "skipped" ]; then
            echo "::error::version-check failed — bump mix.exs version before merging"
            exit 1
          fi

          # e2e-clerk is the only job that exercises the plugin↔backend contract,
          # so it must succeed regardless of trigger — EXCEPT on Dependabot PRs
          # where it's skipped (GitHub doesn't share Clerk + App secrets with
          # Dependabot). The contract test runs unskipped when we squash-merge
          # to main, which is the path of record anyway.
          if [ "$EC" != "success" ] && [ "$EC" != "skipped" ]; then
            echo "::error::e2e-clerk failed: $EC"
            exit 1
          fi

          # On cross-repo plugin dispatch (plugin-e2e-trigger), unit-tests / lint /
          # e2e-local / e2e-browser are intentionally skipped — plugin cannot regress
          # backend internals. Only assert success when those jobs actually ran.
          for pair in "unit-tests=$UT" "lint=$LN" "storage-database=$SD" "e2e-local=$EL" "e2e-browser=$EB"; do
            name="${pair%=*}"; result="${pair#*=}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "::error::$name failed: $result"
              exit 1
            fi
          done

  # Cache BOTH green-CI fingerprints so the next run with the same content
  # (typically the squash-merge to main) can skip the relevant slice.
  #   - backend-hash cache:  unit-tests / lint / e2e-local / e2e-browser
  #   - e2e-hash cache:      e2e-clerk (the (backend, plugin) pairing)
  # On plugin dispatch, ONLY e2e-clerk ran — skip backend marker save in
  # that case to avoid recording a green for jobs that didn't execute.
  record-pass:
    if: always() && needs.ci.result == 'success'
    needs: [fingerprint, ci]
    runs-on: [self-hosted, linux, x64, isolated]
    steps:
      # Markers live in LOCAL_REGISTRY (FastRaid 10.0.20.214:5000) as tiny
      # `FROM scratch` images, NOT actions/cache — see fingerprint job for
      # the ref-scoping bug that motivated the switch. A scratch image with
      # a single file is ~few KB; the registry GCs orphan blobs but keeps
      # tagged manifests indefinitely, so a stale marker only consumes the
      # one referenced blob until a periodic prune job (out of scope).
      - name: Save backend marker to registry
        if: github.event_name != 'repository_dispatch'
        env:
          BACKEND_HASH: ${{ needs.fingerprint.outputs.backend-hash }}
        run: |
          if [ -z "${LOCAL_REGISTRY:-}" ]; then
            echo "::warning::LOCAL_REGISTRY unset — backend marker not saved"
            exit 0
          fi
          TAG="${LOCAL_REGISTRY}/ci-pass:${BACKEND_HASH}"
          WORKDIR=$(mktemp -d)
          echo "passed at $(date -u +%FT%TZ) on ${GITHUB_SHA}" > "${WORKDIR}/marker.txt"
          cat > "${WORKDIR}/Dockerfile" <<'EOF'
          FROM scratch
          COPY marker.txt /marker.txt
          EOF
          docker build -t "$TAG" "$WORKDIR" >/dev/null
          docker push "$TAG"
          rm -rf "$WORKDIR"
          echo "::notice::Saved backend marker $TAG"

      - name: Save e2e marker to registry
        env:
          E2E_HASH: ${{ needs.fingerprint.outputs.e2e-hash }}
          PLUGIN_SHA: ${{ needs.fingerprint.outputs.plugin-sha }}
        run: |
          if [ -z "${LOCAL_REGISTRY:-}" ]; then
            echo "::warning::LOCAL_REGISTRY unset — e2e marker not saved"
            exit 0
          fi
          TAG="${LOCAL_REGISTRY}/ci-e2e-pass:${E2E_HASH}"
          WORKDIR=$(mktemp -d)
          echo "passed at $(date -u +%FT%TZ) on ${GITHUB_SHA} (plugin ${PLUGIN_SHA})" > "${WORKDIR}/marker.txt"
          cat > "${WORKDIR}/Dockerfile" <<'EOF'
          FROM scratch
          COPY marker.txt /marker.txt
          EOF
          docker build -t "$TAG" "$WORKDIR" >/dev/null
          docker push "$TAG"
          rm -rf "$WORKDIR"
          echo "::notice::Saved e2e marker $TAG"

  # When plugin dispatch arrives and the (backend, plugin) pair is already
  # cached green, e2e-clerk is skipped — its in-job "Report E2E status to
  # plugin repo" step therefore does NOT run, leaving the plugin PR with no
  # commit status. This job posts that success directly from the cached pass.
  report-cached-pass-to-plugin:
    if: github.event_name == 'repository_dispatch' && needs.fingerprint.outputs.e2e-cache-hit == 'true'
    needs: fingerprint
    runs-on: [self-hosted, linux, x64, isolated]
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.ENGRAM_CI_CLIENT_ID }}
          private-key: ${{ secrets.ENGRAM_CI_APP_PRIVATE_KEY }}
          owner: engram-app
          repositories: Engram-obsidian

      - name: Report cached e2e pass to plugin repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SHORT_SHA: ${{ github.event.client_payload.plugin_ref }}
        run: |
          if [ -z "$SHORT_SHA" ]; then
            echo "No plugin_ref in payload, skipping status report"
            exit 0
          fi
          PLUGIN_SHA=$(gh api "repos/engram-app/Engram-obsidian/commits/${SHORT_SHA}" --jq '.sha')
          gh api "repos/engram-app/Engram-obsidian/statuses/${PLUGIN_SHA}" \
            -f state="success" \
            -f context="backend/e2e" \
            -f description="E2E tests passed (cached fingerprint match)" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # Build + push the release image to GHCR (staging-fastraid) AND ECR
  # (prod ECS Fargate) in a single buildx invocation. Layers build once,
  # push to both registries; multi-registry login is set up upfront.
  #
  # GHCR side feeds the FastRaid staging chain: trailing steps in this
  # same job (folded from the former `bump-infra-tfvars` job 2026-06-05)
  # open a PR in engram-app/engram-infra bumping `engram_saas_image_tag`;
  # merge of that PR triggers `tf-apply.yml` which POSTs the daemon's
  # `/tf-apply` endpoint → `terraform apply` recreates the container on
  # the new tag. `tf-apply` is the SOLE image-mover for FastRaid; the
  # legacy `/deploy` endpoint on engram-deployer is kept live as
  # break-glass only (not called from CI).
  #
  # ECR side feeds the prod GitOps chain: image lives in ECR tagged
  # `sha-<7chars>` (deterministic deploy handle) plus a `v<X.Y.Z>` tag
  # when HEAD has an annotated `v*` git tag (marketing/audit milestone —
  # NOT `release-v*`, that's the deploy trigger handled by
  # deploy-prod.yml). Image lives in ECR until an operator pushes a
  # `release-v*` tag, at which point deploy-prod.yml opens an infra PR
  # rewriting the prod image tag.
  build-and-publish-image:
    # Build when EITHER (a) full CI just succeeded OR (b) BOTH fingerprints
    # already proved green for this content. Both must be cached, because
    # backend-only validation is insufficient — we also need the (backend,
    # plugin) integration to be known green. Branch protection should still
    # require the `ci` check on PRs; this only kicks in on the main push
    # whose tree has been validated upstream.
    if: |
      always()
      && github.ref == 'refs/heads/main'
      && github.event_name == 'push'
      && (needs.ci.result == 'success' || (needs.fingerprint.outputs.backend-cache-hit == 'true' && needs.fingerprint.outputs.e2e-cache-hit == 'true'))
    needs: [fingerprint, ci]
    runs-on: [self-hosted, linux, x64, isolated]
    # Inherited from the pre-fold build-ecr.yml (workflow-level there;
    # job-level here): don't cancel an in-flight push — every main commit
    # gets its own `sha-` tag in ECR + (when bumped) its own semver in
    # GHCR. ECR lifecycle policy in TF (ecr.tf) caps tagged images at 20
    # + expires untagged after 7 days.
    concurrency:
      group: build-and-publish-image-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      packages: write   # GHCR push
      id-token: write   # aws-actions/configure-aws-credentials OIDC for ECR
      contents: read

    steps:
      - name: Reset sparse-checkout leaked from cross-repo jobs
        run: |
          # See comment in e2e-clerk's "Pre-cleanup stale resources" step.
          # `git sparse-checkout disable` does not clear stale skip-worktree
          # bits on the index, so we nuke .git on detected leak to force a
          # fresh clone via the next actions/checkout step.
          if [ -d .git ] && { [ -f .git/info/sparse-checkout ] || [ "$(git config --get core.sparseCheckout 2>/dev/null)" = "true" ]; }; then
            echo "::warning::Sparse-checkout leak detected — removing .git for fresh clone"
            rm -rf .git
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need tags for `git describe --exact-match` (vtag)

      - name: Compute tags and decide build vs skip
        id: version
        env:
          # True when both fingerprints already proved green for this content
          # — i.e. an identical backend tree + plugin SHA has already shipped.
          # In that state an existing image at the current `mix.exs` version
          # is expected, not a developer-forgot-to-bump error. This is the
          # path TF-driven pushes to `.github/CODEOWNERS` (and any other
          # admin file outside the BACKEND_HASH input set) take.
          CACHE_HIT_BOTH: ${{ needs.fingerprint.outputs.backend-cache-hit == 'true' && needs.fingerprint.outputs.e2e-cache-hit == 'true' }}
          ECR_REPO: ${{ vars.AWS_ECR_REPOSITORY }}
        run: |
          VERSION=$(grep 'version:' mix.exs | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid semver in mix.exs: '$VERSION'" >&2
            exit 1
          fi

          GHCR_IMAGE=$(echo "ghcr.io/${{ github.repository_owner }}/engram" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT="${GITHUB_SHA::7}"
          SHA_TAG="sha-$SHA_SHORT"

          # Optional annotated `v*` git tag for ECR (NOT `release-v*` — that
          # triggers deploy-prod.yml, not an image marker).
          VTAG=""
          if VRAW=$(git describe --tags --exact-match 2>/dev/null) && [[ "$VRAW" =~ ^v[0-9] ]]; then
            VTAG="$VRAW"
          fi

          # Check whether this version already exists in GHCR.
          #
          # Policy:
          #   first-attempt + exists + NOT cache-hit → ERROR (developer forgot
          #                                            to bump version)
          #   first-attempt + exists + cache-hit     → SKIP build, jump to
          #                                            deploy (TF-driven push
          #                                            to .github/** or any
          #                                            file outside the
          #                                            BACKEND_HASH input set
          #                                            — content unchanged, so
          #                                            the existing image IS
          #                                            the right one and no
          #                                            version bump is needed)
          #   rerun + exists                         → SKIP build, jump to
          #                                            deploy (recovery path
          #                                            when an earlier attempt
          #                                            built+pushed but failed
          #                                            at deploy time — e.g.
          #                                            IP-allowlist NAT
          #                                            issue, transient daemon
          #                                            outage)
          #   first or rerun + missing               → BUILD + PUSH + DEPLOY
          #                                            as normal
          #
          # When we SKIP, we skip ECR push too — re-running on the same
          # commit produces a byte-identical image, and ECR's existing
          # `sha-` tag already serves the prod GitOps chain.
          #
          # github.run_attempt is 1 on the first push-triggered run, 2+ on
          # any `gh run rerun` invocation. Cleanly distinguishes "operator
          # didn't bump" from "operator is retrying a known-good build".
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin > /dev/null
          IMAGE_EXISTS=false
          if docker manifest inspect "${GHCR_IMAGE}:${VERSION}" > /dev/null 2>&1; then
            if [ "${{ github.run_attempt }}" = "1" ] && [ "$CACHE_HIT_BOTH" != "true" ]; then
              echo "ERROR: Version ${VERSION} already exists in GHCR. Bump the version in mix.exs before merging." >&2
              exit 1
            fi
            echo "::notice::Image ${GHCR_IMAGE}:${VERSION} already in GHCR (run_attempt=${{ github.run_attempt }}, cache_hit_both=${CACHE_HIT_BOTH}); skipping build, jumping to deploy."
            IMAGE_EXISTS=true
          fi

          # Emit a newline-separated tag list spanning both registries for
          # docker/build-push-action's `tags:` input. Building the list
          # here (vs an inline ternary in the action) keeps the conditional
          # vtag append out of YAML. Each echo writes its own line — do
          # not collapse into a shell here-string with embedded newlines
          # (YAML indentation would leak into the tag values).
          {
            echo "version=$VERSION"
            echo "ghcr_image=$GHCR_IMAGE"
            echo "sha_short=$SHA_SHORT"
            echo "sha_tag=$SHA_TAG"
            echo "vtag=$VTAG"
            echo "image_exists=$IMAGE_EXISTS"
            echo "tags<<EOF"
            echo "${GHCR_IMAGE}:latest"
            echo "${GHCR_IMAGE}:${VERSION}"
            echo "${GHCR_IMAGE}:${SHA_SHORT}"
            echo "${ECR_REPO}:${SHA_TAG}"
            if [ -n "$VTAG" ]; then
              echo "${ECR_REPO}:${VTAG}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$IMAGE_EXISTS" = "true" ]; then
            echo "Version ${VERSION} already built; will skip build + push (both registries)."
          else
            echo "Version ${VERSION} is new — proceeding with build + push to GHCR + ECR."
            echo "GHCR tags: latest, ${VERSION}, ${SHA_SHORT}"
            if [ -n "$VTAG" ]; then
              echo "ECR  tags: ${SHA_TAG}, ${VTAG}"
            else
              echo "ECR  tags: ${SHA_TAG}"
            fi
          fi

      # Host daemon on the runner has Docker 29's containerd-snapshotter enabled,
      # whose push client hits GHCR with `405 Not Allowed` on /blobs/uploads/.
      # docker-container driver runs buildkit in an isolated container with its
      # own push path, sidestepping the host daemon entirely.
      - name: Set up Docker Buildx
        if: steps.version.outputs.image_exists != 'true'
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Login to GHCR
        if: steps.version.outputs.image_exists != 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install AWS CLI v2 (idempotent)
        # Self-hosted runner pool doesn't ship awscli + the runner user has no
        # passwordless sudo. Install into $HOME/.aws-cli (userspace) and add
        # the bin dir to GITHUB_PATH every run.
        #
        # The `[ ! -x "$BIN" ]` path-based check is more reliable than
        # `command -v aws` — GITHUB_PATH additions don't persist across runs,
        # so a PATH-shaped check fails even on a runner where awscli is
        # already present at the expected $HOME/.aws-cli path.
        #
        # `--update` makes `aws/install` idempotent even when an existing
        # install is present (otherwise it errors with "Found preexisting AWS
        # CLI installation"). The path check above keeps the fast path;
        # --update is the safety net for race conditions.
        if: steps.version.outputs.image_exists != 'true'
        run: |
          BIN="$HOME/.aws-cli/bin/aws"
          if [ ! -x "$BIN" ]; then
            curl -sSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            rm -rf /tmp/awscli
            unzip -q /tmp/awscliv2.zip -d /tmp/awscli
            /tmp/awscli/aws/install \
              --install-dir "$HOME/.aws-cli" \
              --bin-dir "$HOME/.aws-cli/bin" \
              --update
            rm -rf /tmp/awscliv2.zip /tmp/awscli
          fi
          echo "$HOME/.aws-cli/bin" >> "$GITHUB_PATH"
          "$BIN" --version

      - name: Configure AWS credentials (OIDC)
        if: steps.version.outputs.image_exists != 'true'
        # v6 (Node 24). v4 used Node 20, which GH deprecates 2026-09-16.
        # Inputs `role-to-assume` and `aws-region` are stable across both.
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        if: steps.version.outputs.image_exists != 'true'
        run: |
          aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin \
              "${{ vars.AWS_ECR_REPOSITORY }}"

      # Local FS cache on the self-hosted runner — bounded by disk speed
      # instead of GHCR latency. The old registry cache fetched every layer
      # over HTTPS on every build; local cache is ~10× faster for cache hits.
      # Pre-fold, ECR built without this cache (cold every time); ECR push
      # now benefits from the same warm layers GHCR has used since #391.
      - name: Restore buildx cache
        if: steps.version.outputs.image_exists != 'true'
        uses: actions/cache@v5
        with:
          path: /tmp/buildx-cache
          key: buildx-${{ runner.os }}-${{ hashFiles('Dockerfile', 'mix.lock', 'frontend/bun.lock') }}
          restore-keys: |
            buildx-${{ runner.os }}-

      # ONE build, pushed to GHCR (3 tags) + ECR (1-2 tags). Buildx pushes
      # layers per-registry but the underlying build runs once. Sentry
      # source maps + build-args get baked into the same image both
      # registries serve. `secrets:` mounts SENTRY_AUTH_TOKEN via tmpfs —
      # never written to image layers. The Vite plugin self-disables when
      # the token is empty, so an unset secret is a graceful no-op (stack
      # traces ship un-symbolicated until the token lands).
      - name: Build and push image
        if: steps.version.outputs.image_exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          platforms: linux/amd64
          cache-from: type=local,src=/tmp/buildx-cache
          cache-to: type=local,dest=/tmp/buildx-cache-new,mode=max
          tags: ${{ steps.version.outputs.tags }}
          build-args: |
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_GIT_SHA=${{ github.sha }}
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_PROJECT=${{ vars.SENTRY_PROJECT_FRONTEND }}
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}

      # Atomically swap new cache over old. actions/cache@v5 has no built-in
      # rotation; without this step the cache grows unbounded across runs.
      - name: Rotate buildx cache
        if: steps.version.outputs.image_exists != 'true' && always()
        run: |
          if [ -d /tmp/buildx-cache-new ]; then
            rm -rf /tmp/buildx-cache
            mv /tmp/buildx-cache-new /tmp/buildx-cache
          fi

      # Lift SENTRY_AUTH_TOKEN into a step output so the next two steps
      # can gate on it. GH Actions doesn't allow the `secrets` context in
      # step-level `if:` conditions, so the env-indirection is the
      # documented workaround.
      - name: Detect Sentry auth token
        id: sentry-token
        if: steps.version.outputs.image_exists != 'true'
        env:
          TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SENTRY_AUTH_TOKEN unset — skipping Sentry release steps. Stack traces will ship un-symbolicated until the secret lands."
          fi

      # Create + finalize a Sentry release tagged with the commit SHA.
      # The Vite plugin in the frontend stage of Dockerfile already pushed
      # source maps under the same release name; this step only registers
      # the release in Sentry's UI and tags the deploy environment so
      # "Releases" shows what's running and "Suspect Commits" can finger a
      # likely-culprit commit on a new error.
      #
      # NB: was `getsentry/action-release@v3` until 2026-06-05. That
      # composite action invokes `docker://ghcr.io/getsentry/action-release-image:<tag>`
      # and upstream made the image package private — every historical tag
      # returns 404 to anonymous pulls. GH pre-pulls all docker:// images
      # at job init, before any step's `continue-on-error` applies, so the
      # job dies in init and #449's strict-mode re-enable can't help.
      # Inlining sentry-cli sidesteps the upstream dependency; same end
      # state in Sentry (release + finalize + deploy env tag).
      #
      # continue-on-error: true — release-tagging is UI-only nicety, not a
      # deploy gate. Keep soft until the upstream regression has signal of
      # being stable; revisit per #444 close-out criteria.
      - name: Sentry releases (frontend + backend)
        if: steps.version.outputs.image_exists != 'true' && steps.sentry-token.outputs.has_token == 'true'
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          FRONTEND_PROJECT: ${{ vars.SENTRY_PROJECT_FRONTEND }}
          BACKEND_PROJECT: ${{ vars.SENTRY_PROJECT_BACKEND }}
          VERSION: ${{ github.sha }}
        run: |
          # `INSTALL_DIR=` belongs on the `bash` side of the pipe — the env on
          # the curl side stays with the curl process and the install script
          # falls back to /usr/local/bin, which then needs sudo on this runner.
          curl -sL https://sentry.io/get-cli/ | INSTALL_DIR="${RUNNER_TEMP}" bash
          CLI="${RUNNER_TEMP}/sentry-cli"

          # Single release name (commit SHA) associated with BOTH projects via
          # repeated `-p`. finalize/deploys are release-scoped, run once.
          "$CLI" releases new -p "$FRONTEND_PROJECT" -p "$BACKEND_PROJECT" "$VERSION"
          "$CLI" releases finalize "$VERSION"
          "$CLI" releases deploys "$VERSION" new -e prod

      # ── Infra bump (folded from former bump-infra-tfvars job) ─────────
      #
      # Second leg of the TF-via-daemon control plane: release → infra PR →
      # TF apply via daemon recreates the container on the new tag.
      #
      # Folded into this job (2026-06-05) to eliminate the cross-job
      # boundary — the prior split made bump re-clone the repo just to
      # re-read `mix.exs` for VERSION, since GitHub Actions can't pass
      # step outputs between jobs without explicit `outputs:` plumbing.
      # Now both phases share `steps.version.outputs.version` directly.
      #
      # Runs on BOTH the fresh-build path AND the cache-hit/rerun path:
      # a TF-driven push to `.github/**` (image unchanged, bump is skipped
      # by the early version step) still needs to fire an infra PR for
      # the deploy chain to advance. Hence the bump steps below don't
      # gate on `image_exists`.
      #
      # `tf-apply` in engram-infra is the SOLE image-mover. The legacy
      # `/deploy` endpoint stays live as break-glass only; CI no longer
      # calls it. Health verification of the post-apply container lives
      # in engram-infra's `tf-apply.yml` — a verification failure marks
      # the infra PR's check red, not this job's.
      #
      # Future: once selfhost lands under TF (Path E.3b / Phase C of the
      # cutover plan), the regex picks up `engram_selfhost_image_tag` too
      # and the bump covers both containers in one PR.
      #
      # Required App permissions on engram-infra:
      #   - contents: read & write  (push branch)
      #   - pull-requests: read & write  (open PR)
      # Adjust at https://github.com/organizations/engram-app/settings/apps/engram-infra-tf
      # if a step below 403s.
      - name: Generate engram-infra App installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: engram-app
          repositories: engram-infra

      - name: Checkout engram-infra
        uses: actions/checkout@v6
        with:
          repository: engram-app/engram-infra
          token: ${{ steps.app-token.outputs.token }}
          path: engram-infra
          ref: main
          # peter-evans/create-pull-request@v8 sets its own Authorization
          # header on push; persist-credentials=true would leave the
          # checkout's basic-auth extraheader in git config, and the
          # second header triggers GitHub's "Duplicate header: Authorization"
          # 400 (observed on first real bot run during the 2026-05-19
          # cutover). The create-pull-request step still uses the same
          # app-token via its `token:` input.
          persist-credentials: false

      - name: Rewrite image_tag defaults in variables.tf
        id: rewrite
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Python rewrite anchored on the variable block names — robust
          # against other `default = ` lines being added later in the file.
          # Matches engram_saas_image_tag today and engram_selfhost_image_tag
          # once selfhost is imported into TF (Path E.3b). saas and selfhost
          # share the same image so the bump always moves them together;
          # accepting either 1 or 2 matches lets this work before AND after
          # the selfhost import. Hard-fail on 0 or 3+ (variables.tf shape
          # changed — investigate).
          #
          # If variables.tf is absent (e.g. after a Phase-A-style revert)
          # emit `bumped=false` and exit clean. The bump step downstream is
          # gated on `bumped=true` so this becomes a no-op until TF state
          # catches up.
          python3 - <<'PY'
          import os
          import re

          path = "engram-infra/main/envs/staging-fastraid/variables.tf"
          version = os.environ["VERSION"]
          gh_output = os.environ["GITHUB_OUTPUT"]

          if not os.path.exists(path):
              print(f"::notice::{path} not present — Path E.3 not yet re-imported; bump skipped")
              with open(gh_output, "a") as f:
                  f.write("bumped=false\n")
              raise SystemExit(0)

          text = open(path).read()
          pattern = re.compile(
              r'(variable\s+"engram_(?:saas|selfhost)_image_tag"[^}]*?default\s*=\s*)"[^"]+"',
              re.DOTALL,
          )
          new, count = pattern.subn(rf'\g<1>"{version}"', text)
          if count not in (1, 2):
              raise SystemExit(
                  f"expected 1 or 2 variable blocks to update, got {count}; "
                  "variables.tf shape changed — adjust the regex"
              )
          open(path, "w").write(new)
          with open(gh_output, "a") as f:
              f.write("bumped=true\n")
          print(f"rewrote {count} block(s) to {version}")
          PY

          if [ -f engram-infra/main/envs/staging-fastraid/variables.tf ]; then
            echo "::group::variables.tf after rewrite"
            cat engram-infra/main/envs/staging-fastraid/variables.tf
            echo "::endgroup::"
          fi

      - name: Open / update PR in engram-infra
        id: open-pr
        if: steps.rewrite.outputs.bumped == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          path: engram-infra
          token: ${{ steps.app-token.outputs.token }}
          branch: bot/bump-engram-staging-fastraid
          delete-branch: true
          # engram-infra's ruleset enforces required_signatures = true.
          # sign-commits routes the commit through the GraphQL
          # createCommitOnBranch mutation, which GitHub auto-signs on
          # behalf of the engram-infra-tf App. Without this the bot's
          # branch commit is unsigned and the PR blocks at merge time
          # with "Commits must have verified signatures."
          sign-commits: true
          commit-message: |
            chore(staging-fastraid): bump engram image to ${{ steps.version.outputs.version }}

            Automated bump from engram-app/Engram release.
          title: "chore(staging-fastraid): bump engram image to ${{ steps.version.outputs.version }}"
          body: |
            Automated bump from engram-app/Engram release.

            Source commit: ${{ github.repository }}@${{ github.sha }}

            Bumps `engram_saas_image_tag` (and `engram_selfhost_image_tag` once selfhost is imported into TF via Path E.3b) from current default to **${{ steps.version.outputs.version }}**.

            ## What this triggers

            On merge, `.github/workflows/tf-apply.yml` POSTs the merge SHA to engram-deployer's `/tf-apply` endpoint on FastRaid. The daemon runs `terraform apply` against the local Docker socket, recreating the engram-saas container with the new image. `/tf-plan` upserts a plan comment as part of the PR review gate (live since 2026-05-18).

            `tf-apply` is the SOLE image-mover (the legacy `/deploy` endpoint stays live as break-glass only; CI no longer calls it). Expect plan output to be a single `~ image` field change on `docker_container.engram_saas` plus the post-apply health-verify step on the new tag.

            ## Review

            Auto-generated; if `variables.tf` has any non-image diff, treat as a regex regression and investigate before merging.
          labels: |
            automated
            tf-image-bump

      - name: Enable auto-merge on bot PR
        # Auto-merge queues the PR for merge once required checks pass.
        # Without this the bot PR sits open waiting for a human click —
        # that's how the 2026-05-22 cascade started (4-day-old bot PR
        # carrying stale template env on engram-infra). Engram-infra has
        # `allow_auto_merge=true` set in repos.tf so the GraphQL mutation
        # succeeds. Reuses the existing engram-infra-tf App token;
        # `pull_requests: write` is already granted for create-pull-request.
        if: steps.open-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.open-pr.outputs.pull-request-number }}
        run: |
          gh pr merge --auto --squash --repo engram-app/engram-infra "$PR_NUMBER"

  # Submit the Hex SBOM to GitHub's dependency-submission API after merge.
  # GitHub's static mix.lock parser silently fails on this repo (verified
  # 2026-05-22: the repo's SBOM contained 0 `pkg:hex` packages despite 200+
  # Hex deps in mix.lock), so Dependabot security alerts never surfaced
  # CVEs that mix_audit catches. This submission merges with GitHub's
  # broken static parsing so Dependabot's scanner has accurate data.
  #
  # Pre-fold (dependency-submission.yml), this used workflow-level
  # `paths: [mix.exs, mix.lock]`. After fold, the guard step below
  # diffs HEAD~1 vs HEAD on those paths and exits early when the deps
  # didn't change — same effect as the old path filter. We intentionally
  # do NOT include ci.yml in the guard (every ci.yml edit shouldn't
  # republish the SBOM); workflow_dispatch path lives in cron.yml.
  #
  # Gate matches build-and-publish-image.
  submit-dep-graph:
    if: |
      always()
      && github.ref == 'refs/heads/main'
      && github.event_name == 'push'
      && (needs.ci.result == 'success' || (needs.fingerprint.outputs.backend-cache-hit == 'true' && needs.fingerprint.outputs.e2e-cache-hit == 'true'))
    needs: [fingerprint, ci]
    runs-on: [self-hosted, linux, x64, isolated]
    permissions:
      contents: write
    steps:
      - name: Reset sparse-checkout leaked from cross-repo jobs
        run: |
          # See comment in e2e-clerk's "Pre-cleanup stale resources" step.
          if [ -d .git ] && { [ -f .git/info/sparse-checkout ] || [ "$(git config --get core.sparseCheckout 2>/dev/null)" = "true" ]; }; then
            echo "::warning::Sparse-checkout leak detected — removing .git for fresh clone"
            rm -rf .git
          fi

      - uses: actions/checkout@v6
        with:
          # Need parent commit so the guard's HEAD~1 diff works.
          fetch-depth: 2

      - name: Path-filter early-exit
        id: guard
        run: |
          set -euo pipefail
          if ! git diff --quiet HEAD~1 HEAD -- mix.exs mix.lock 2>/dev/null; then
            echo "Dep files changed — submitting SBOM."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "No dep changes — skipping SBOM submission."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch deps
        # Separate from the action's own `install-deps: true` so transient
        # hex.pm timeouts are easier to diagnose.
        if: steps.guard.outputs.skip != 'true'
        run: mix deps.get

      - name: Submit Hex SBOM to GitHub
        if: steps.guard.outputs.skip != 'true'
        uses: erlef/mix-dependency-submission@v1
        with:
          # install-deps=true ensures a complete transitive graph. Without
          # it, only direct deps appear — and most CVEs live in transitive
          # deps (cowboy_telemetry, mime, etc.).
          install-deps: true
