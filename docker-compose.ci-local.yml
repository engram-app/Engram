# CI overlay: local auth provider for API-only tests.
# Usage: docker compose -f docker-compose.ci.yml -f docker-compose.ci-local.yml -p engram-ci-local up -d --wait

services:
  engram:
    environment:
      AUTH_PROVIDER: local
      # Clerk vars not needed in local mode
      CLERK_JWKS_URL: ""
      CLERK_ISSUER: ""
      # CI tests register many users rapidly from same IP
      RATE_LIMIT_AUTH_OVERRIDE: "1000"
      # Self-host default in production is invite_only; pin "open" here so the
      # API-only e2e fixtures (which register many users) don't need to seed
      # an admin + flip the gate before every test.
      ENGRAM_DEFAULT_REGISTRATION_MODE: open
