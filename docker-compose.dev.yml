# Local dev stack — isolated Postgres + Qdrant for `make dev-selfhost`.
# Non-standard ports so this can co-exist with any other Postgres/Qdrant on
# the host. NEVER point at a remote DB; this stack is the source of truth.
services:
  postgres:
    image: postgres:16-alpine
    container_name: engram-dev-postgres
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
      POSTGRES_DB: engram_dev
    ports:
      - "5433:5432"
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram -d engram_dev"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: engram-dev-qdrant
    ports:
      - "6334:6333"
    volumes:
      - qdrant_dev_data:/qdrant/storage
    restart: unless-stopped

volumes:
  pg_dev_data:
  qdrant_dev_data:
