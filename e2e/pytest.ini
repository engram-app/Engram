[pytest]
asyncio_mode = auto
timeout = 180
testpaths = tests
# reruns are OFF: pytest-rerunfailures masked real defects for weeks
# (rerun-safety class, e2e-delivery-flake-playbook.md §5 — session fixtures
# + hash-equal broadcast-skip make attempt 2 deterministically different).
# A flaky test is a finding, never a retry. See testing-surface-audit doc.
reruns = 0
addopts = -ra

# ── Logging ──────────────────────────────────────────────────────────────
# log_cli is OFF by default — stdout flushing per log line adds latency
# across a long serial suite. Enable with `-o log_cli=true` when debugging
# locally; CI still captures DEBUG+ to pytest-e2e.log for post-mortem.

# Capture ALL logging (DEBUG+) to file for post-mortem analysis
log_file = pytest-e2e.log
log_file_level = DEBUG
log_file_format = %(asctime)s %(levelname)-8s %(name)s: %(message)s
log_file_date_format = %H:%M:%S
