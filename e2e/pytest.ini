[pytest]
asyncio_mode = auto
timeout = 180
testpaths = tests
# reruns intentionally disabled. The harness now self-heals the
# previously-flaky vault-registration cluster (active registerVault in
# helpers/cdp.py:wait_for_vault_registered), drives the echo-suppression
# expiry deterministically (accelerate_echo_expiry), and dismisses stacked
# modals via bounded retry (dismiss_modals). Keeping reruns hid real
# regressions behind a green wall; removing it makes flakes visible
# immediately so we can address root causes instead of papering over them.
# -ra = show short summary for (a)ll non-passing outcomes.
addopts = -ra

# ── Logging ──────────────────────────────────────────────────────────────
# log_cli is OFF by default — stdout flushing per log line adds latency
# across a long serial suite. Enable with `-o log_cli=true` when debugging
# locally; CI still captures DEBUG+ to pytest-e2e.log for post-mortem.

# Capture ALL logging (DEBUG+) to file for post-mortem analysis
log_file = pytest-e2e.log
log_file_level = DEBUG
log_file_format = %(asctime)s %(levelname)-8s %(name)s: %(message)s
log_file_date_format = %H:%M:%S
